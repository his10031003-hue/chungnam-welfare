const calcCharge=(dues,rate)=>{
  if((dues||0)<10000) return 0;
  return Math.round((dues||0)*(rate??90)/100);
};

function showToast(msg,type=''){
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},2500);
}

// DB 함수
const getMember=async uid=>{const s=await getDoc(doc(db,'members',uid));return s.exists()?{id:s.id,...s.data()}:null};
const getMembers=async()=>{const s=await getDocs(collection(db,'members'));return s.docs.map(d=>({id:d.id,...d.data()}))};
const saveMember=(uid,data)=>setDoc(doc(db,'members',uid),{...data,updatedAt:serverTimestamp()},{merge:true});
const getLimit=async(uid,ym)=>{const s=await getDoc(doc(db,'limits',`${uid}_${ym}`));return s.exists()?s.data():null};
const saveLimit=(uid,ym,data)=>setDoc(doc(db,'limits',`${uid}_${ym}`),{uid,ym,...data,updatedAt:serverTimestamp()},{merge:true});
const getAllLimits=async ym=>{try{const s=await getDocs(query(collection(db,'limits'),where('ym','==',ym)));return s.docs.map(d=>({id:d.id,...d.data()}))}catch{return[]}};
const addWReq=data=>addDoc(collection(db,'welfare_requests'),{...data,status:'pending',createdAt:serverTimestamp()});
const getMyWReqs=async uid=>{try{const s=await getDocs(query(collection(db,'welfare_requests'),where('uid','==',uid),orderBy('createdAt','desc')));return s.docs.map(d=>({id:d.id,...d.data()}))}catch{return[]}};
const getAllWReqs=async ym=>{try{const s=await getDocs(query(collection(db,'welfare_requests'),where('ym','==',ym),orderBy('createdAt','desc')));return s.docs.map(d=>({id:d.id,...d.data()}))}catch{return[]}};

const addSanjo=data=>addDoc(collection(db,'sanjo'),{...data,status:'pending',createdAt:serverTimestamp()});
const getMySanjo=async uid=>{try{const s=await getDocs(query(collection(db,'sanjo'),where('uid','==',uid),orderBy('createdAt','desc')));return s.docs.map(d=>({id:d.id,...d.data()}))}catch{return[]}};
const getAllSanjo=async()=>{try{const s=await getDocs(query(collection(db,'sanjo'),orderBy('createdAt','desc')));return s.docs.map(d=>({id:d.id,...d.data()}))}catch{return[]}};
const updateSanjo=(id,data)=>updateDoc(doc(db,'sanjo',id),{...data,updatedAt:serverTimestamp()});

// 기부금영수증
const addDonation=data=>addDoc(collection(db,'donations'),{...data,status:'pending',createdAt:serverTimestamp()});
const getMyDonations=async uid=>{try{const s=await getDocs(query(collection(db,'donations'),where('uid','==',uid),orderBy('createdAt','desc')));return s.docs.map(d=>({id:d.id,...d.data()}))}catch{return[]}};

let CU=null,CM=null;
const stL=s=>({pending:'대기중',approved:'승인',rejected:'반려',paid:'지급완료',active:'활성',inactive:'정지',withdraw:'탈퇴신청'}[s]||s);
const stC=s=>({pending:'ba',approved:'bb',rejected:'br',paid:'bg',active:'bg',inactive:'br',withdraw:'br'}[s]||'bb');
const roleL=r=>({admin:'최고관리자',sub_admin:'부관리자',finance:'재무총장',member:'조합원'}[r]||r);
const roleC=r=>({admin:'bg',sub_admin:'bb',finance:'bp',member:'ba'}[r]||'ba');

const MTABS=[
  {id:'home',icon:'ti-home',label:'홈'},
  {id:'welfare',icon:'ti-credit-card',label:'복지신청'},
  {id:'sanjo',icon:'ti-heart',label:'상조회비'},
  {id:'notice',icon:'ti-speakerphone',label:'공지사항'},
  {id:'myinfo',icon:'ti-user',label:'내 정보'}
];
const ATABS=[
  {id:'admin-dash',icon:'ti-layout-dashboard',label:'대시보드'},
  {id:'admin-members',icon:'ti-users',label:'조합원'},
  {id:'admin-charge',icon:'ti-bolt',label:'충전'},
  {id:'admin-approve',icon:'ti-check',label:'승인'},
  {id:'admin-notice',icon:'ti-speakerphone',label:'공지'},

];

function tbar(tabs,active){
  return `<nav class="tbar">${tabs.map(t=>`<div class="ti ${t.id===active?'on':''}" data-page="${t.id}"><i class="ti ${t.icon}"></i>${t.label}</div>`).join('')}</nav>`;
}

async function go(pid){
  const isA=['admin','sub_admin','finance'].includes(CM?.role);
  const tabs=isA?ATABS:MTABS;
  let html='';
  try{
    switch(pid){
      case 'home':html=await pgHome();break;
      case 'welfare':html=await pgWelfare();break;
      case 'sanjo':html=await pgSanjo();break;
      case 'myinfo':html=pgMyInfo();break;
      case 'admin-dash':html=await pgADash();break;
      case 'admin-dues-status':html=await pgADuesStatus();break;
      case 'admin-members':html=await pgAMembers();break;
      case 'admin-charge':html=await pgACharge();break;
      case 'admin-approve':html=await pgAApprove();break;
      case 'admin-catreq':html=await pgACatReq();break;
      case 'admin-notice':html=await pgANotice();break;
      case 'notice':html=await pgNotice();break;
      case 'admin-myinfo':html=pgAdminMyInfo();break;
      default:html=`<div class="pg"><div class="em"><i class="ti ti-error-404"></i><p>없는 페이지</p></div></div>`;
    }
  }catch(e){console.error(e);html=`<div class="pg"><div class="em"><i class="ti ti-alert-circle"></i><p>오류: ${e.message}</p></div></div>`;}
  appEl.innerHTML=`<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden">${html}${tbar(tabs,pid)}</div>`;
  document.querySelectorAll('.ti').forEach(t=>t.addEventListener('click',()=>go(t.dataset.page)));
  bindPg(pid);
}

function bindPg(pid){
  switch(pid){
    case 'welfare':bWelfare();break;
    case 'sanjo':bSanjo();break;
    case 'myinfo':bMyInfo();break;
    case 'admin-members':bAMembers();break;
    case 'admin-charge':bACharge();break;
    case 'admin-approve':bAApprove();break;
    case 'admin-catreq':bACatReq();break;
    case 'notice':bNotice();break;
    case 'admin-notice':bANotice();break;
    case 'admin-myinfo':
      document.getElementById('admin-logout-btn')?.addEventListener('click',()=>signOut(auth));
      document.getElementById('ai-save')?.addEventListener('click',async()=>{
        const name=document.getElementById('ai-name').value.trim();
        const email=document.getElementById('ai-email').value.trim();
        if(!name) return showToast('이름을 입력하세요','err');
        await saveMember(CU.uid,{name,email});
        CM={...CM,name,email};
        showToast('저장됐습니다');
        setTimeout(()=>go('admin-myinfo'),500);
      });
      // 전체 잔액 재계산
      document.getElementById('recalc-btn')?.addEventListener('click',async()=>{
        const btn=document.getElementById('recalc-btn');
        const result=document.getElementById('recalc-result');
        btn.disabled=true;
        btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 재계산 중...';
        result.textContent='';
        try{
          const ym=thisYm();
          const [members,wReqs,sanjos]=await Promise.all([getMembers(),getAllWReqs(ym),getAllSanjo()]);
          let count=0;
          for(const m of members){
            if(m.status!=='active') continue;
            // 승인된 복지비 합계 (카테고리별)
            const approvedW=wReqs.filter(r=>r.uid===m.id&&r.status==='approved');
            const usedAmounts={};
            CK.forEach(k=>{usedAmounts[k]=0;});
            approvedW.forEach(r=>{
              if(usedAmounts[r.category]!==undefined) usedAmounts[r.category]+=r.amount||0;
              else usedAmounts[r.category]=r.amount||0;
            });
            // 승인된 상조회비 합계
            const approvedS=sanjos.filter(s=>s.uid===m.id&&s.status==='approved'&&s.ym===ym);
            const sanjoUsed=approvedS.reduce((s,x)=>s+(x.amount||0),0);
            // limit 업데이트
            await saveLimit(m.id,ym,{usedAmounts,sanjoUsed});
            count++;
          }
          result.textContent=`✓ ${count}명 재계산 완료`;
          result.style.color='#27500A';
          showToast(`${count}명 잔액 재계산 완료`);
        }catch(e){
          result.textContent='오류: '+e.message;
          result.style.color='#A32D2D';

async function pgWelfare(){

  // 승인된 금액만 잔액에서 차감 (대기중은 표시만)

  return `<div class="hdr"><h2>복지비 신청</h2>

function bWelfare(){
  document.getElementById('w-date').value=today();

  // 금액 입력 시 잔액 실시간 표시
  document.getElementById('w-amt')?.addEventListener('input',function(){
    const amt=parseInt(this.value)||0;
    const totalRemain=parseInt(this.dataset.remain)||0;
    const afterRemain=totalRemain-amt;
    const el=document.getElementById('w-remain-val');
    if(!el)return;
    el.textContent=fmtW(Math.max(0,afterRemain));
    el.style.color=afterRemain<0?'#A32D2D':'#004A2F';
  });

  document.getElementById('w-sub')?.addEventListener('click',async()=>{
    const cat=document.getElementById('w-cat').value;
    const amt=parseInt(document.getElementById('w-amt').value)||0;
    const date=document.getElementById('w-date').value;
    const memo=document.getElementById('w-memo').value.trim();
    const receipt=document.getElementById('w-receipt').value.trim();
    const totalRemain=parseInt(document.getElementById('w-amt').dataset.remain)||0;
    if(!amt||amt<=0)return showToast('금액을 입력하세요','err');
    if(!date)return showToast('날짜를 선택하세요','err');
    if(amt>totalRemain)return showToast(`잔여 복지비 ${fmtW(totalRemain)} 초과입니다`,'err');
    const btn=document.getElementById('w-sub');btn.disabled=true;
    try{
      const ym=thisYm();
      await addWReq({uid:CU.uid,memberName:CM?.name||'',category:cat,amount:amt,usedDate:date,memo,receipt,ym});
      notify('복지비 신청',`${CM?.name}님\n카테고리: ${CATS[cat]?.label}\n금액: ${fmtW(amt)}\n사용처: ${memo}`,CM?.name||'',CM?.phone||'');
      showToast('복지비 신청이 완료되었습니다');
      setTimeout(()=>go('welfare'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
    finally{btn.disabled=false;}
  });
}

function bSanjo(){
  document.getElementById('s-date').value=today();
  document.getElementById('s-sub')?.addEventListener('click',async()=>{
    const type=document.getElementById('s-type').value;
    if(!type)return showToast('경사/애사를 선택하세요','err');
    let amt=parseInt(document.getElementById('s-amt').value)||0;
    if(amt===0)amt=parseInt(document.getElementById('s-amt-etc')?.value)||0;
    if(!amt||amt<=0)return showToast('금액을 선택하거나 입력하세요','err');
    const date=document.getElementById('s-date').value;
    const note=document.getElementById('s-note').value.trim();

    if(!date)return showToast('날짜를 선택하세요','err');
    // 잔액 체크 (복지비+상조비 통합 한도)
    const ym=thisYm();
    const lim=await getLimit(CU.uid,ym);
    const totalCharge=lim?.totalCharge||lim?.chargeAmount||0;
    const ua=lim?.usedAmounts||{};

      notify('상조회비 신청',`${CM?.name}님\n구분: ${type==='happy'?'경사':'애사'}\n금액: ${fmtW(amt)}\n내용: ${note}\n잔여복지비: ${fmtW(totalRemain-amt)}`,CM?.name||'',CM?.phone||'');

function bMyInfo(){
  document.getElementById('logout-btn')?.addEventListener('click',()=>signOut(auth));
  document.getElementById('withdraw-btn')?.addEventListener('click',async()=>{
    if(!confirm('탈퇴를 신청하시겠습니까?\n관리자 확인 후 처리됩니다.'))return;
    await saveMember(CU.uid,{status:'withdraw'});
    notify('탈퇴 신청',`${CM?.name}님이 탈퇴를 신청했습니다.`,CM?.name||'',CM?.phone||'');
    showToast('탈퇴 신청이 접수되었습니다');
    CM={...CM,status:'withdraw'};
    setTimeout(()=>go('myinfo'),800);
  });
  document.getElementById('acc-edit-btn')?.addEventListener('click',()=>document.getElementById('acc-modal').classList.remove('hd'));
  document.getElementById('acc-close')?.addEventListener('click',()=>document.getElementById('acc-modal').classList.add('hd'));
  document.getElementById('acc-save')?.addEventListener('click',async()=>{
    const bank=document.getElementById('acc-bank').value.trim();
    const welfare=document.getElementById('acc-welfare').value.trim();
    await saveMember(CU.uid,{bankAccount:bank,welfareAccount:welfare});
    CM={...CM,bankAccount:bank,welfareAccount:welfare};
    showToast('계좌 정보가 저장됐습니다');
    document.getElementById('acc-modal').classList.add('hd');
    setTimeout(()=>go('myinfo'),500);
  });
  // 조합비 변경 신청 내역 로드
  getMyDuesReqs(CU.uid).then(reqs=>{
    const wrap=document.getElementById('dr-list-wrap');
    if(!wrap)return;
    if(!reqs.length){wrap.innerHTML='<div class="em" style="padding:12px"><i class="ti ti-clock"></i><p style="font-size:12px">변경 신청 내역이 없습니다</p></div>';return;}
    wrap.innerHTML=reqs.map(r=>`<div class="lr">
      <div class="ic ica"><i class="ti ti-coins"></i></div>
      <div class="inf">
        <div class="nm">${r.applyMonth||''} · ${fmtW(r.newDues)}으로 변경</div>
        <div class="sb">${r.reason||''}</div>
        <span class="bdg ${stC(r.status)}" style="margin-top:3px">${stL(r.status)}</span>
      </div>
    </div>`).join('');
  });
  // 조합비 변경 신청
  document.getElementById('dr-sub')?.addEventListener('click',async()=>{
    const newDues=parseInt(document.getElementById('dr-dues').value)||0;
    const applyMonth=document.getElementById('dr-month').value;
    const reason=document.getElementById('dr-reason').value.trim();
    if(!newDues||newDues<=0)return showToast('변경할 조합비를 입력하세요','err');
    if(!applyMonth)return showToast('적용 월을 선택하세요','err');
    const btn=document.getElementById('dr-sub');btn.disabled=true;
    try{
      await addDuesReq({uid:CU.uid,memberName:CM?.name||'',phone:CM?.phone||'',currentDues:CM?.dues||0,newDues,applyMonth,reason});
      notify('조합비 변경 신청',`${CM?.name}님\n현재: ${fmtW(CM?.dues||0)} → 변경: ${fmtW(newDues)}\n적용월: ${applyMonth}\n사유: ${reason}`,CM?.name||'',CM?.phone||'');
      showToast('조합비 변경 신청이 완료되었습니다');
      document.getElementById('dr-dues').value='';
      document.getElementById('dr-reason').value='';
      setTimeout(()=>go('myinfo'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
    finally{btn.disabled=false;}
  });
  document.getElementById('don-rr1')?.addEventListener('input',function(){
    if(this.value.length===6) document.getElementById('don-rr2')?.focus();
  });
  getMyDonations(CU.uid).then(reqs=>{
    const wrap=document.getElementById('don-list-wrap');
    if(!wrap)return;
    if(!reqs.length){wrap.innerHTML='<div class="em" style="padding:16px"><i class="ti ti-file-off"></i><p>신청 내역이 없습니다</p></div>';return;}
    wrap.innerHTML=reqs.map(r=>`<div class="lr">
      <div class="ic icp"><i class="ti ti-file-invoice"></i></div>
      <div class="inf">
        <div class="nm">${r.year}년도 기부금영수증</div>
        <div class="sb">${fmtW(r.amount)} · ${r.memo||''}</div>
        <span class="bdg ${stC(r.status)}" style="margin-top:3px">${stL(r.status)}</span>
        ${r.status==='approved'?`<span style="font-size:10px;color:#27500A;margin-left:4px">✓ 발급완료</span>`:''}
      </div>
    </div>`).join('');
  });
  // 기부금영수증 신청
  document.getElementById('don-sub')?.addEventListener('click',async()=>{
    const year=document.getElementById('don-year').value;
    const amt=parseInt(document.getElementById('don-amt').value)||0;
    const donName=document.getElementById('don-name').value.trim();
    const rr1=document.getElementById('don-rr1').value.trim();
    const rr2=document.getElementById('don-rr2').value.trim();
    const addr=document.getElementById('don-addr').value.trim();
    const addr2=document.getElementById('don-addr2').value.trim();
    const memo=document.getElementById('don-memo').value.trim();
    if(!amt||amt<=0)return showToast('신청 금액을 입력하세요','err');
    if(!donName)return showToast('성명을 입력하세요','err');
    if(!rr1||rr1.length!==6||!rr2||rr2.length!==7)return showToast('주민등록번호를 정확히 입력하세요','err');
    if(!/^\d+$/.test(rr1+rr2))return showToast('주민등록번호는 숫자만 입력하세요','err');
    if(!addr)return showToast('주소를 입력하세요','err');
    // 주민등록번호 마스킹 처리 (뒷 6자리 마스킹)
    const rrMasked=`${rr1}-${rr2[0]}******`;
    const fullAddress=addr+(addr2?' '+addr2:'');
    const btn=document.getElementById('don-sub');btn.disabled=true;
    try{
      await addDonation({
        uid:CU.uid,memberName:donName,phone:CM?.phone||'',
        year,amount:amt,memo,address:fullAddress,
        residentNum:rrMasked,         // 마스킹된 번호만 저장
        residentFull:`${rr1}${rr2}`,  // 전체 번호 (관리자용)
      });
      notify('기부금영수증 신청',`${donName}님\n연도: ${year}년\n금액: ${fmtW(amt)}\n주소: ${fullAddress}`,donName,CM?.phone||'');
      showToast('기부금영수증 신청이 완료되었습니다');
      document.getElementById('don-amt').value='';
      document.getElementById('don-rr1').value='';
      document.getElementById('don-rr2').value='';
      document.getElementById('don-addr').value='';
      document.getElementById('don-addr2').value='';
      document.getElementById('don-memo').value='';
      setTimeout(()=>go('myinfo'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
    finally{btn.disabled=false;}
  });
}

// ══ 관리자 대시보드 ══
async function pgADash(){
  const ym=thisYm();
  const [members,limits,sanjos,wReqs]=await Promise.all([getMembers(),getAllLimits(ym),getAllSanjo(),getAllWReqs(ym)]);
  const active=members.filter(m=>m.status==='active');
  const pending=members.filter(m=>m.status==='pending');
  const withdraw=members.filter(m=>m.status==='withdraw');
  const lmap=Object.fromEntries(limits.map(l=>[l.uid,l]));
  // 납부 완료: active 회원 중 paid=true
  const paidMembers=active.filter(m=>lmap[m.id]?.paid);
  const paid=paidMembers.length;
  // 총 충전액: 납부완료 회원의 dues 기준으로 실시간 계산
  const totalCharge=paidMembers.reduce((s,m)=>s+calcCharge(m.dues||0,m.chargeRate??90),0);
  // 전체 조합비 합계
  const totalDues=active.reduce((s,m)=>s+(m.dues||0),0);
  const paidDues=paidMembers.reduce((s,m)=>s+(m.dues||0),0);
  const pS=sanjos.filter(s=>s.status==='pending');
  const pW=wReqs.filter(r=>r.status==='pending');
  const paidPct=active.length?Math.round(paid/active.length*100):0;
  return `<div class="hdr">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><h2>관리자 대시보드</h2><p>${ymLabel(ym)}</p></div>
      <span class="bdg bg">${roleL(CM?.role)}</span>
    </div>
  </div>
  <div class="pg">
    <div class="sg">
      <div class="sb2" onclick="go('admin-members')" style="cursor:pointer"><div class="vl">${active.length}명</div><div class="lb">활성 조합원 →</div></div>
      <div class="sb2" onclick="go('admin-members')" style="cursor:pointer"><div class="vl" style="color:#A32D2D">${pending.length}명</div><div class="lb">가입 대기 →</div></div>
      <div class="sb2" onclick="go('admin-approve')" style="cursor:pointer"><div class="vl" style="color:#854F0B">${pS.length+pW.length}건</div><div class="lb">승인 대기 →</div></div>
      <div class="sb2" onclick="go('admin-members')" style="cursor:pointer"><div class="vl" style="color:#A32D2D">${withdraw.length}명</div><div class="lb">탈퇴 신청 →</div></div>
    </div>
    ${pending.length?`<div class="nt nta"><i class="ti ti-user-plus"></i><p>가입 대기 <strong>${pending.length}명</strong> — 조합원 탭에서 승인</p></div>`:''}
    ${withdraw.length?`<div class="nt nta"><i class="ti ti-user-minus"></i><p>탈퇴 신청 <strong>${withdraw.length}명</strong> — 조합원 탭에서 처리</p></div>`:''}
    ${(pS.length+pW.length)?`<div class="nt ntb"><i class="ti ti-clock"></i><p>복지비 <strong>${pW.length}건</strong> · 상조회비 <strong>${pS.length}건</strong> 승인 대기</p></div>`:''}
    <div class="card" style="cursor:pointer" onclick="go('admin-dues-status')">
      <div class="ch"><i class="ti ti-chart-bar"></i><span>조합비 수납 현황 (${ymLabel(ym)})</span>
        <span style="font-size:11px;color:var(--text2)">클릭하여 내역 보기 →</span>
      </div>
      <div style="padding:12px 16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:12px;color:var(--text2)">납부 완료</span>
          <span style="font-size:13px;font-weight:600">${paid} / ${active.length}명</span>
        </div>
        <div class="pw"><div class="pf" style="width:${paidPct}%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <span style="font-size:12px;color:var(--text2)">수납 조합비</span>
          <span style="font-size:12px;font-weight:700">${fmtW(paidDues)}</span>
        </div>
        ${totalCharge>0?`<div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-size:12px;color:var(--text2)">총 충전액 (90%)</span>
          <span style="font-size:12px;font-weight:700;color:var(--green)">${fmtW(totalCharge)}</span>
        </div>`:''}
        <div style="display:flex;justify-content:space-between;margin-top:4px">
          <span style="font-size:12px;color:var(--text2)">전체 조합비 (미납포함)</span>
          <span style="font-size:12px;color:var(--text2)">${fmtW(totalDues)}</span>
        </div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn btn-p" onclick="go('admin-charge')"><i class="ti ti-bolt"></i> 충전 관리</button>
      <button class="btn btn-s" onclick="go('admin-approve')"><i class="ti ti-check"></i> 승인 처리</button>
    </div>
  </div>`;
}

// ══ 관리자 조합비 수납현황 상세 ══
async function pgADuesStatus(){
  const ym=thisYm();
  const [members,limits]=await Promise.all([getMembers(),getAllLimits(ym)]);
  const active=members.filter(m=>m.status==='active');
  const lmap=Object.fromEntries(limits.map(l=>[l.uid,l]));

  const paid=active.filter(m=>lmap[m.id]?.paid);
  const unpaid=active.filter(m=>!lmap[m.id]?.paid);
  const totalDues=active.reduce((s,m)=>s+(m.dues||0),0);
  const paidDues=paid.reduce((s,m)=>s+(m.dues||0),0);
  const totalCharge=paid.reduce((s,m)=>s+calcCharge(m.dues||0,m.chargeRate??90),0);

  const mkRow=(m,isPaid)=>{
    const lim=lmap[m.id]||{};
    const charge=calcCharge(m.dues||0,m.chargeRate??90);
    return `<div class="lr">
      <div class="ic ${isPaid?'icg':'icr'}" style="font-size:13px;font-weight:700;flex-shrink:0">${(m.name||'?')[0]}</div>
      <div class="inf">
        <div class="nm">${m.name||''}</div>
        <div class="sb">${m.jobType==='전직'?'전직(사무총국)':m.jobType==='현직'?`현직(${m.dept||''})`:m.dept||''}</div>
        <div class="sb">조합비 ${fmtW(m.dues||0)} · 복지충전 ${fmtW(charge)}</div>
        ${m.bankAccount?`<div class="sb">납부계좌: ${m.bankAccount}</div>`:''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span class="bdg ${isPaid?'bg':'br'}">${isPaid?'납부완료':'미납'}</span>
        ${lim.charged?`<div style="font-size:10px;color:#27500A;margin-top:3px">충전완료</div>`:`<div style="font-size:10px;color:#854F0B;margin-top:3px">미충전</div>`}
      </div>
    </div>`;
  };

  return `<div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="go('admin-dash')" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px">← 뒤로</button>
      <div><h2>조합비 수납 현황</h2><p>${ymLabel(ym)} · 납부 ${paid.length}/${active.length}명</p></div>
    </div>
  </div>
  <div class="pg">
    <div class="sg" style="margin-bottom:10px">
      <div class="sb2"><div class="vl" style="color:#27500A">${paid.length}명</div><div class="lb">납부 완료</div></div>
      <div class="sb2"><div class="vl" style="color:#A32D2D">${unpaid.length}명</div><div class="lb">미납</div></div>
      <div class="sb2"><div class="vl" style="font-size:14px">${fmtW(paidDues)}</div><div class="lb">수납 조합비</div></div>
      <div class="sb2"><div class="vl" style="font-size:14px;color:var(--green)">${fmtW(totalCharge)}</div><div class="lb">총 충전액</div></div>
    </div>
    ${paid.length?`
    <div class="sl">납부 완료 (${paid.length}명)</div>
    <div class="card">${paid.map(m=>mkRow(m,true)).join('')}</div>`:''}
    ${unpaid.length?`
    <div class="sl">미납 (${unpaid.length}명)</div>
    <div class="card">${unpaid.map(m=>mkRow(m,false)).join('')}</div>`:''}
  </div>`;
}

window.pickJob=function(t){
  document.getElementById('jb-prev').className='job-btn'+(t==='전직'?' on':'');

function bAMembers(){
  const open=uid=>{
    const m=uid?allM.find(x=>x.id===uid):null;
    document.getElementById('m-title').textContent=uid?'회원 수정':'회원 추가';
    document.getElementById('m-uid').value=uid||'';
    document.getElementById('m-name').value=m?.name||'';
    document.getElementById('m-phone').value=m?.phone||'';
    document.getElementById('m-dues').value=m?.dues||'';
    document.getElementById('m-rate').value=m?.chargeRate??90;
    document.getElementById('m-bank').value=m?.bankAccount||'';
    document.getElementById('m-wacc').value=m?.welfareAccount||'';
    document.getElementById('m-status').value=m?.status||'active';
    document.getElementById('m-role').value=m?.role||'member';
    document.getElementById('m-pw-wrap').style.display=uid?'none':'block';
    document.getElementById('m-del').style.display=uid?'flex':'none';
    if(m?.jobType) pickJob(m.jobType);
    if(m?.dept) document.getElementById('m-dept').value=m.dept;
    document.getElementById('mem-modal').classList.remove('hd');
  };
  document.getElementById('add-btn')?.addEventListener('click',()=>open());
  document.getElementById('m-close')?.addEventListener('click',()=>document.getElementById('mem-modal').classList.add('hd'));
  document.querySelectorAll('.edit-btn').forEach(b=>b.addEventListener('click',()=>open(b.dataset.uid)));
  document.getElementById('m-save')?.addEventListener('click',async()=>{
    const uid=document.getElementById('m-uid').value;
    const name=document.getElementById('m-name').value.trim();
    const pw=document.getElementById('m-pw').value;
    const phone=document.getElementById('m-phone').value.trim().replace(/-/g,'');
    const jobType=document.getElementById('m-jobtype').value;
    const dept=jobType==='현직'?document.getElementById('m-dept').value.trim():'사무총국';
    const dues=parseInt(document.getElementById('m-dues').value)||0;
    const rate=parseInt(document.getElementById('m-rate').value)||90;
    const bank=document.getElementById('m-bank').value.trim();
    const wacc=document.getElementById('m-wacc').value.trim();
    const status=document.getElementById('m-status').value;
    const role=document.getElementById('m-role').value;
    if(!name||!phone)return showToast('이름과 전화번호를 입력하세요','err');
    const btn=document.getElementById('m-save');btn.disabled=true;
    try{
      let sid=uid;
      if(!uid){
        if(!pw||pw.length<6){showToast('비밀번호 6자 이상','err');btn.disabled=false;return;}
        const fakeEmail=`${phone}@moim.app`;
        const c=await createUserWithEmailAndPassword(auth,fakeEmail,pw);
        sid=c.user.uid;
      }
      const ym=thisYm();
      const ex=uid?allM.find(x=>x.id===uid):null;
      const dH={...ex?.duesHistory||{},[ym]:{dues,charge:calcCharge(dues,rate)}};
      await saveMember(sid,{name,phone,jobType,dept,dues,chargeRate:rate,bankAccount:bank,welfareAccount:wacc,status,role,duesHistory:dH,groupName:'충남도청'});
      showToast(uid?'수정됐습니다':'추가됐습니다');
      document.getElementById('mem-modal').classList.add('hd');
      setTimeout(()=>go('admin-members'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
    finally{btn.disabled=false;}
  });
  document.getElementById('m-del')?.addEventListener('click',async()=>{
    if(!confirm('정말 삭제하시겠습니까?'))return;
    await deleteDoc(doc(db,'members',document.getElementById('m-uid').value));
    showToast('삭제됐습니다');
    document.getElementById('mem-modal').classList.add('hd');
    setTimeout(()=>go('admin-members'),800);
  });
}

function bACharge(){
  const ym=thisYm();
  const doCharge=async uid=>{
    const m=allM.find(x=>x.id===uid);if(!m)return;
    const lim=await getLimit(uid,ym);
    const mDues=m.dues??0; // 항상 dues 필드 기준
    const mRate=m.chargeRate??90;
    const charge=calcCharge(mDues,mRate);
    // duesHistory도 동기화
    const dH={...m.duesHistory||{},[ym]:{dues:mDues,charge}};
    await saveMember(uid,{duesHistory:dH});
    const catAmounts={};
    CK.forEach(k=>{catAmounts[k]=m.catAmounts?.[k]||Math.round(charge/CK.length);});
    await saveLimit(uid,ym,{dues:mDues,chargeRate:mRate,chargeAmount:charge,totalCharge:charge,catAmounts,usedAmounts:lim?.usedAmounts||{},sanjoUsed:lim?.sanjoUsed||0,paid:true,charged:true});
  };
  document.querySelectorAll('.tog-paid').forEach(btn=>btn.addEventListener('click',async()=>{
    const paid=btn.dataset.paid==='true';
    await saveLimit(btn.dataset.uid,ym,{paid:!paid});
    showToast(!paid?'납부 완료':'미납으로 변경');
    setTimeout(()=>go('admin-charge'),600);
  }));
  document.querySelectorAll('.do-charge').forEach(btn=>btn.addEventListener('click',async()=>{
    if(btn.disabled)return;
    btn.disabled=true;btn.textContent='충전중...';
    try{await doCharge(btn.dataset.uid);showToast('충전 완료');setTimeout(()=>go('admin-charge'),600);}
    catch(e){showToast('오류: '+e.message,'err');btn.disabled=false;}
  }));
  document.getElementById('bulk-btn')?.addEventListener('click',async()=>{
    const btn=document.getElementById('bulk-btn');
    btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 처리 중...';
    try{
      const [members,limits]=await Promise.all([getMembers(),getAllLimits(ym)]);
      allM=members;
      const lmap=Object.fromEntries(limits.map(l=>[l.uid,l]));
      const to=members.filter(m=>m.status==='active'&&lmap[m.id]?.paid&&!lmap[m.id]?.charged);
      await Promise.all(to.map(m=>doCharge(m.id)));
      showToast(`${to.length}명 충전 완료`);
      setTimeout(()=>go('admin-charge'),800);
    }catch(e){showToast('오류: '+e.message,'err');btn.disabled=false;}
  });
  document.querySelectorAll('.chg-dues').forEach(btn=>btn.addEventListener('click',()=>{
    const uid=btn.dataset.uid;
    const m=allM.find(x=>x.id===uid);
    document.getElementById('dc-uid').value=uid;
    document.getElementById('dc-amt').value=m?.duesHistory?.[ym]?.dues??m?.dues??0;
    document.getElementById('dc-rate').value=m?.chargeRate??90;
    document.getElementById('dues-modal').classList.remove('hd');
  }));
  document.getElementById('dc-close')?.addEventListener('click',()=>document.getElementById('dues-modal').classList.add('hd'));
  document.getElementById('dc-save')?.addEventListener('click',async()=>{
    const uid=document.getElementById('dc-uid').value;
    const dues=parseInt(document.getElementById('dc-amt').value)||0;
    const rate=parseInt(document.getElementById('dc-rate').value)||90;
    const m=allM.find(x=>x.id===uid);
    const dH={...m?.duesHistory||{},[ym]:{dues,charge:calcCharge(dues,rate)}};
    await saveMember(uid,{duesHistory:dH});
    showToast('이달 회비가 변경됐습니다');
    document.getElementById('dues-modal').classList.add('hd');
    setTimeout(()=>go('admin-charge'),800);
  });
}

function bAApprove(){
  document.querySelectorAll('.approve-member').forEach(btn=>btn.addEventListener('click',()=>{
    document.getElementById('ap-uid').value=btn.dataset.uid;
    document.getElementById('ap-dues').value='';
    document.getElementById('ap-rate').value='90';
    document.querySelectorAll('.ap-cat').forEach(i=>i.value='');
    document.getElementById('app-modal').classList.remove('hd');
  }));
  document.getElementById('ap-close')?.addEventListener('click',()=>document.getElementById('app-modal').classList.add('hd'));
  document.getElementById('ap-approve')?.addEventListener('click',async()=>{
    const uid=document.getElementById('ap-uid').value;
    const dues=parseInt(document.getElementById('ap-dues').value)||0;
    const rate=parseInt(document.getElementById('ap-rate').value)||90;
    const catAmounts={};
    document.querySelectorAll('.ap-cat').forEach(i=>{catAmounts[i.dataset.cat]=parseInt(i.value)||0;});
    const ym=thisYm();
    const btn=document.getElementById('ap-approve');btn.disabled=true;
    try{
      await saveMember(uid,{status:'active',dues,chargeRate:rate,catAmounts,duesHistory:{[ym]:{dues,charge:calcCharge(dues,rate)}}});
      showToast('승인됐습니다');
      document.getElementById('app-modal').classList.add('hd');
      setTimeout(()=>go('admin-approve'),800);
    }catch(e){showToast('오류: '+e.message,'err');btn.disabled=false;}
  });
  document.querySelectorAll('.reject-member').forEach(btn=>btn.addEventListener('click',async()=>{
    if(!confirm('반려하시겠습니까?'))return;
    await saveMember(btn.dataset.uid,{status:'rejected'});
    showToast('반려됐습니다');
    setTimeout(()=>go('admin-approve'),800);
  }));
  document.querySelectorAll('.approve-w').forEach(btn=>btn.addEventListener('click',async()=>{
    const {id,uid,cat,amount}=btn.dataset;
    try{
      await updateWReq(id,{status:'approved'});
      const ym=thisYm();
      const lim=await getLimit(uid,ym);
      const used={...lim?.usedAmounts||{}};
      used[cat]=(used[cat]||0)+parseInt(amount);
      await saveLimit(uid,ym,{usedAmounts:used});
      showToast('승인됐습니다');
      setTimeout(()=>go('admin-approve'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
  }));
  document.querySelectorAll('.reject-w').forEach(btn=>btn.addEventListener('click',async()=>{
    await updateWReq(btn.dataset.id,{status:'rejected'});
    showToast('반려됐습니다');
    setTimeout(()=>go('admin-approve'),800);
  }));
  document.querySelectorAll('.approve-s').forEach(btn=>btn.addEventListener('click',async()=>{
    try{
      // 해당 신청 정보 가져오기
      const sanjoDoc=await getDoc(doc(db,'sanjo',btn.dataset.id));
      if(sanjoDoc.exists()){
        const s=sanjoDoc.data();
        const ym=s.ym||thisYm();
        // 잔액에서 상조회비 차감
        const lim=await getLimit(s.uid,ym);
        const prevSanjoUsed=lim?.sanjoUsed||0;
        await saveLimit(s.uid,ym,{sanjoUsed:prevSanjoUsed+s.amount});
      }
      await updateSanjo(btn.dataset.id,{status:'approved'});
      showToast('승인됐습니다');
      setTimeout(()=>go('admin-approve'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
  }));
  document.querySelectorAll('.reject-s').forEach(btn=>btn.addEventListener('click',async()=>{
    await updateSanjo(btn.dataset.id,{status:'rejected'});
    showToast('반려됐습니다');
    setTimeout(()=>go('admin-approve'),800);
  }));
  // 기부금영수증 승인/반려
  document.querySelectorAll('.approve-d').forEach(btn=>btn.addEventListener('click',async()=>{
    await updateDonation(btn.dataset.id,{status:'approved'});
    showToast('기부금영수증 발급 승인됐습니다');
    setTimeout(()=>go('admin-approve'),800);
  }));
  document.querySelectorAll('.reject-d').forEach(btn=>btn.addEventListener('click',async()=>{
    await updateDonation(btn.dataset.id,{status:'rejected'});
    showToast('반려됐습니다');
    setTimeout(()=>go('admin-approve'),800);
  }));
  // 조합비 변경 승인 → 회원 dues 필드 자동 업데이트
  document.querySelectorAll('.approve-dr').forEach(btn=>btn.addEventListener('click',async()=>{
    const {id,uid,dues}=btn.dataset;
    try{
      const newDues=parseInt(dues);
      const ym=thisYm();
      // 회원 dues 업데이트 + duesHistory 업데이트
      const m=await getMember(uid);
      const rate=m?.chargeRate??90;
      const dH={...m?.duesHistory||{},[ym]:{dues:newDues,charge:calcCharge(newDues,rate)}};
      await saveMember(uid,{dues:newDues,duesHistory:dH});
      await updateDuesReq(id,{status:'approved'});
      showToast('조합비 변경이 승인됐습니다');
      setTimeout(()=>go('admin-approve'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
  }));
  document.querySelectorAll('.reject-dr').forEach(btn=>btn.addEventListener('click',async()=>{
    await updateDuesReq(btn.dataset.id,{status:'rejected'});
    showToast('반려됐습니다');
    setTimeout(()=>go('admin-approve'),800);
  }));
}

// ══ 관리자 카테고리별 신청·승인 ══
async function pgACatReq(){
  const ym=thisYm();
  const [wReqs,members]=await Promise.all([getAllWReqs(ym),getMembers()]);
  const mmap=Object.fromEntries(members.map(m=>[m.id,m]));

  // 카테고리별로 그룹핑
  const grouped={};
  CK.forEach(k=>{grouped[k]={cat:CATS[k],pending:[],approved:[],rejected:[]};});
  wReqs.forEach(r=>{
    if(grouped[r.category]){
      const st=r.status==='pending'?'pending':r.status==='approved'?'approved':'rejected';
      grouped[r.category][st].push(r);
    }
  });

  const catSections=CK.map(k=>{
    const g=grouped[k];
    const allReqs=[...g.pending,...g.approved,...g.rejected];
    if(!allReqs.length) return '';

    const rows=allReqs.map(r=>{
      const m=mmap[r.uid]||{};
      const stCls2=r.status==='pending'?'ba':r.status==='approved'?'bg':'br';
      const stTxt=r.status==='pending'?'대기중':r.status==='approved'?'승인':'반려';
      return `<div class="lr" style="flex-wrap:wrap;gap:6px">
        <div class="inf">
          <div class="nm">${m.name||r.memberName||r.uid} · ${fmtW(r.amount)}</div>
          <div class="sb">${r.usedDate||''} · ${r.memo||''}</div>
          ${r.receipt?`<div class="sb">영수증: ${r.receipt}</div>`:''}
          <span class="bdg ${stCls2}" style="margin-top:3px">${stTxt}</span>
        </div>
        ${r.status==='pending'?`<div style="display:flex;gap:4px;flex-shrink:0">
          <button style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:var(--green);color:#fff;border:none" class="catq-approve" data-id="${r.id}" data-uid="${r.uid}" data-cat="${r.category}" data-amount="${r.amount}">승인</button>
          <button style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:#FCEBEB;color:#791F1F;border:none" class="catq-reject" data-id="${r.id}">반려</button>
        </div>`:''}
      </div>`;
    }).join('');

    const pendingCnt=g.pending.length;
    return `<div class="sl" style="display:flex;align-items:center;gap:6px">
      <i class="ti ${g.cat.icon}" style="color:${g.cat.color};font-size:14px"></i>
      ${g.cat.label}
      ${pendingCnt?`<span class="bdg ba">${pendingCnt}건 대기</span>`:'<span class="bdg bg">모두 처리됨</span>'}
    </div>
    <div class="card">${rows}</div>`;
  }).join('');

  const totalPending=wReqs.filter(r=>r.status==='pending').length;

  return `<div class="hdr"><h2>카테고리별 신청 현황</h2><p>${ymLabel(ym)} · 대기 ${totalPending}건</p></div>
  <div class="pg">
    ${!catSections.trim()?'<div class="em"><i class="ti ti-receipt-off"></i><p>이달 신청 내역이 없습니다</p></div>':catSections}
  </div>`;
}

          <div style="flex:1">

              ${n.pinned?`<span style="background:#e74c3c;color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700">공지</span>`:''}
              <span style="font-size:13px;font-weight:600">${n.title}</span>
            </div>
            <div style="font-size:11px;color:var(--text2)">${n.createdAt?.toDate?fmtDt(n.createdAt.toDate()):''}</div>
          </div>
          <button class="btn btn-s nc-del-btn" data-nid="${n.id}" style="padding:4px 10px;font-size:12px;background:#e74c3c;color:#fff;flex-shrink:0"><i class="ti ti-trash"></i> 삭제</button>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--text2);white-space:pre-wrap;max-height:80px;overflow:hidden;line-height:1.5">${(n.body||'').substring(0,200)}${(n.body||'').length>200?'…':''}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ══ 회원 가입 ══
function renderSignup(){
  appEl.innerHTML=`
  <div class="lw">
    <i class="ti ti-building-community" style="font-size:48px;color:#fff;margin-bottom:8px"></i>
    <div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">조합 복지 앱</div>
    <div style="font-size:13px;color:rgba(255,255,255,.65);margin-bottom:24px">충남도청 조합원 가입 신청</div>
    <div class="lc">
      <div style="font-size:15px;font-weight:700;margin-bottom:16px;text-align:center">조합원 가입 신청</div>
      <div class="ig"><label>이름</label><input type="text" id="s-name" placeholder="홍길동"/></div>
      <div class="ig">
        <label>전화번호 (로그인 아이디로 사용)</label>
        <input type="tel" id="s-phone" placeholder="010-0000-0000" maxlength="13"/>
      </div>
      <div class="ig"><label>비밀번호 (6자 이상)</label><input type="password" id="s-pw" placeholder="비밀번호 설정"/></div>
      <div class="ig"><label>비밀번호 확인</label><input type="password" id="s-pw2" placeholder="비밀번호 재입력"/></div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px">직종 선택</label>
        <div class="job-grid">
          <div class="job-btn" id="s-jb-prev" onclick="sPickJob('전직')">전직 (사무총국)</div>
          <div class="job-btn" id="s-jb-curr" onclick="sPickJob('현직')">현직 (부서명 입력)</div>
        </div>
        <input type="hidden" id="s-jobtype"/>
        <div class="ig" id="s-dept-wrap" style="display:none;margin-bottom:0">
          <input type="text" id="s-dept" placeholder="부서명 입력 (예: 기획조정실)"/>
        </div>
      </div>
      <div class="ig"><label>조합비 납부 계좌 (선택)</label><input type="text" id="s-bank" placeholder="농협 351-0000-0000-03 홍길동"/></div>
      <div class="ig"><label>복지비 수령 계좌 (선택)</label><input type="text" id="s-welfare" placeholder="농협 351-0000-0000-03 홍길동"/></div>
      <div style="border-top:.5px solid #e0e0e0;margin:12px 0;padding-top:12px">
        <div style="font-size:12px;font-weight:600;color:#6b6b6b;margin-bottom:8px">월 조합비 (관리자 승인 후 확정)</div>
        <div class="ig" style="margin-bottom:6px">
          <label>월 납부 조합비 (원)</label>
          <input type="number" id="s-dues" placeholder="예: 30000" step="1000"/>
        </div>
        <div style="background:#EAF3DE;border-radius:8px;padding:8px 10px;font-size:11px;color:#27500A">
          <i class="ti ti-info-circle"></i> 복지 충전액 = 조합비의 90%로 자동 계산됩니다
        </div>
      </div>
      <button class="btn btn-p" id="signup-btn" style="margin-bottom:10px"><i class="ti ti-user-plus"></i> 가입 신청하기</button>
      <button class="btn btn-s" id="to-login-btn">이미 계정이 있으신가요? 로그인</button>
    </div>
  </div>`;
  window.sPickJob=function(t){
    document.getElementById('s-jb-prev').className='job-btn'+(t==='전직'?' on':'');
    document.getElementById('s-jb-curr').className='job-btn'+(t==='현직'?' on':'');
    document.getElementById('s-jobtype').value=t;
    document.getElementById('s-dept-wrap').style.display=t==='현직'?'block':'none';
  };
  document.getElementById('signup-btn')?.addEventListener('click',async()=>{
    const name=document.getElementById('s-name').value.trim();
    const phone=document.getElementById('s-phone').value.trim().replace(/-/g,'');
    const pw=document.getElementById('s-pw').value;
    const pw2=document.getElementById('s-pw2').value;
    const jobType=document.getElementById('s-jobtype').value;
    const dept=jobType==='현직'?document.getElementById('s-dept').value.trim():'사무총국';
    const bank=document.getElementById('s-bank').value.trim();
    const welfare=document.getElementById('s-welfare').value.trim();
    const dues=parseInt(document.getElementById('s-dues').value)||0;
    if(!name||!phone)return showToast('이름과 전화번호를 입력하세요','err');
    if(phone.length<10)return showToast('전화번호를 정확히 입력하세요','err');
    if(!pw||pw.length<6)return showToast('비밀번호를 6자 이상 입력하세요','err');
    if(pw!==pw2)return showToast('비밀번호가 일치하지 않습니다','err');
    if(!jobType)return showToast('직종을 선택하세요','err');
    // 전화번호를 이메일 형식으로 변환 (Firebase용)
    const fakeEmail=`${phone}@moim.app`;
    const btn=document.getElementById('signup-btn');btn.disabled=true;
    try{
      const c=await createUserWithEmailAndPassword(auth,fakeEmail,pw);
      await saveMember(c.user.uid,{name,phone,jobType,dept,bankAccount:bank,welfareAccount:welfare,dues,chargeRate:90,status:'pending',role:'member',groupName:'충남도청'});
      notify('새 조합원 가입 신청',`${name}님이 가입 신청했습니다.\n전화번호: ${phone}\n직종: ${jobType==='전직'?'전직(사무총국)':'현직('+dept+')'}`,name,phone);
      showToast('가입 신청 완료! 관리자 승인을 기다려주세요.');
      await signOut(auth);
      renderLogin();
    }catch(e){
      if(e.code==='auth/email-already-in-use'){
        showToast('이미 가입된 전화번호입니다','err');
      } else {
        showToast('오류: '+e.message,'err');
      }
      btn.disabled=false;
    }
  });
  document.getElementById('to-login-btn')?.addEventListener('click',renderLogin);
}

// ══ 로그인 ══
function renderLogin(){
  appEl.innerHTML=`
  <div class="lw">
    <i class="ti ti-building-community" style="font-size:48px;color:#fff;margin-bottom:8px"></i>
    <div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">조합 복지 앱</div>
    <div style="font-size:13px;color:rgba(255,255,255,.65);margin-bottom:24px">충남도청 조합 후생복지</div>
    <div class="lc">
      <div class="ig">
        <label>전화번호 (또는 관리자 이메일)</label>
        <input type="text" id="l-phone" placeholder="010-0000-0000" autocomplete="tel"/>
      </div>
      <div class="ig">
        <label>비밀번호</label>
        <input type="password" id="l-pw" placeholder="비밀번호 입력" autocomplete="current-password"/>
      </div>
      <button class="btn btn-p" id="login-btn" style="margin-bottom:10px"><i class="ti ti-login"></i> 로그인</button>
      <button class="btn btn-s" id="to-signup-btn"><i class="ti ti-user-plus"></i> 조합원 가입 신청</button>
      <p style="text-align:center;font-size:12px;color:#6b6b6b;margin-top:10px">계정 문의: 관리자에게 연락하세요</p>
    </div>
  </div>`;
  const doLogin=async()=>{
    const input=document.getElementById('l-phone').value.trim();
    const pw=document.getElementById('l-pw').value;
    if(!input||!pw)return showToast('전화번호와 비밀번호를 입력하세요','err');
    const btn=document.getElementById('login-btn');
    btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 로그인 중...';
    // 이메일 형식이면 그대로, 전화번호면 변환
    const isEmail=input.includes('@');
    const loginId=isEmail?input:`${input.replace(/-/g,'')}@moim.app`;
    try{await signInWithEmailAndPassword(auth,loginId,pw);}
    catch(e){showToast('전화번호 또는 비밀번호가 올바르지 않습니다','err');btn.disabled=false;btn.innerHTML='<i class="ti ti-login"></i> 로그인';}
  };
  document.getElementById('login-btn')?.addEventListener('click',doLogin);
  document.getElementById('l-pw')?.addEventListener('keydown',e=>e.key==='Enter'&&doLogin());
  document.getElementById('to-signup-btn')?.addEventListener('click',renderSignup);
}

// ══ 초기화 ══
appEl.innerHTML=`<div class="lw"><i class="ti ti-loader-2 spin" style="font-size:40px;color:#fff"></i></div>`;
onAuthStateChanged(auth,async user=>{
  if(!user){renderLogin();return;}
  CU=user;CM=await getMember(user.uid);
  if(!CM){showToast('회원 정보를 찾을 수 없습니다','err');await signOut(auth);return;}
  go(CM.role==='admin'?'admin-dash':'home');
});
window.go=go;
</script>
</body>
</html>
