// 복지 충전액 계산 - 조합비 1만원 미만은 0원
// 복지비 계산: 조합비 1만원은 필수 운영비로 차감, 초과분의 (rate)%를 복지비로 산정, 천원단위 반올림
const calcCharge=(dues,rate)=>{
  const d=dues||0;
  if(d<10000) return 0;
  const excess=d-10000;
  const welfare=excess*(rate??90)/100;
  return Math.round(welfare/1000)*1000;
};
// 기부금(조합비) 세액공제 예상액 계산: 연 1천만원 이하 15%, 초과분 30%
const calcTaxCredit=(annualDues)=>{
  const a=annualDues||0;
  if(a<=10000000) return Math.round(a*0.15);
  return Math.round(10000000*0.15 + (a-10000000)*0.30);
};

function hlText(text, kw){
  if(!kw||!text) return String(text||'');
  const esc=kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return String(text).replace(new RegExp(`(${esc})`,'gi'),'<span class="hl">$1</span>');
}

  const doFilter=()=>{
    const kw=inp.value.trim().toLowerCase();
    const items=document.querySelectorAll(containerSelector);
    let shown=0;
    items.forEach(el=>{
      const txt=(el.dataset.search||'').toLowerCase();
      const match=!kw||txt.includes(kw);
      el.style.display=match?'':'none';
      if(match){
        shown++;
        if(kw){
          el.querySelectorAll('.srch-hl[data-raw]').forEach(span=>{
            span.innerHTML=hlText(span.dataset.raw,kw);
          });
        } else {
          el.querySelectorAll('.srch-hl[data-raw]').forEach(span=>{
            span.textContent=span.dataset.raw;
          });
        }
      }
    });
    if(cntEl) cntEl.textContent=kw?`${shown}건`:'';
  };
  inp.addEventListener('input',doFilter);
  if(clrBtn) clrBtn.addEventListener('click',()=>{inp.value='';doFilter();inp.focus();});
}

function showToast(msg,type=''){
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},2500);
}

    case 'admin-donation':bADonation();break;
    case 'admin-settings':bASettings();break;
    case 'notice':bNotice();break;
    case 'admin-notice':bANotice();break;
    case 'admin-inquiry':bAInquiry();break;

    case 'admin-myinfo':
      document.getElementById('admin-logout-btn')?.addEventListener('click',()=>signOut(auth));
      document.getElementById('ai-save')?.addEventListener('click',async()=>{
        const name=document.getElementById('ai-name').value.trim();
        const email=document.getElementById('ai-email').value.trim();
        if(!name) return showToast('이름을 입력하세요','err');
        await saveMember(CU.uid,{name,email});
        CM={...CM,name,email};
        showToast('저장됐습니다');
        setTimeout(()=>go('admin-myinfo'),500);
      });
      // 전체 잔액 재계산
      document.getElementById('recalc-btn')?.addEventListener('click',async()=>{
        const btn=document.getElementById('recalc-btn');
        const result=document.getElementById('recalc-result');
        btn.disabled=true;
        btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 재계산 중...';
        result.textContent='';
        try{
          const ym=thisYm();
          const [members,wReqs,sanjos]=await Promise.all([getMembers(),getAllWReqs(ym),getAllSanjo()]);
          let count=0;
          for(const m of members){
            if(m.status!=='active') continue;
            // 승인된 복지비 합계 (카테고리별)
            const approvedW=wReqs.filter(r=>r.uid===m.id&&r.status==='approved');
            const usedAmounts={};
            CK.forEach(k=>{usedAmounts[k]=0;});
            approvedW.forEach(r=>{
              if(usedAmounts[r.category]!==undefined) usedAmounts[r.category]+=r.amount||0;
              else usedAmounts[r.category]=r.amount||0;
            });
            // 승인된 상조회비 합계
            const approvedS=sanjos.filter(s=>s.uid===m.id&&s.status==='approved'&&s.ym===ym);
            const sanjoUsed=approvedS.reduce((s,x)=>s+(x.amount||0),0);
            // limit 업데이트
            await saveLimit(m.id,ym,{usedAmounts,sanjoUsed});
            count++;
          }
          result.textContent=`✓ ${count}명 재계산 완료`;
          result.style.color='#27500A';
          showToast(`${count}명 잔액 재계산 완료`);
        }catch(e){
          result.textContent='오류: '+e.message;
          result.style.color='#A32D2D';
          showToast('오류: '+e.message,'err');
        }finally{
          btn.disabled=false;
          btn.innerHTML='<i class="ti ti-refresh"></i> 전체 잔액 재계산';
        }
      });
      break;
  }
}

            <div style="font-size:18px;font-weight:800;color:#fff">${pct}%</div>
          </div>
        </div>
      </div>`;
  });
}

function bWelfare(){
  // 대기중 복지비 신청 취소
  document.querySelectorAll('.wf-cancel-btn').forEach(btn=>btn.addEventListener('click',async()=>{
    if(!confirm('이 복지비 신청을 취소하시겠습니까?')) return;
    try{
      await deleteDoc(doc(db,'welfare_requests',btn.dataset.wid));
      showToast('신청이 취소되었습니다');
      setTimeout(()=>go('welfare'),600);
    }catch(e){showToast('오류: '+e.message,'err');}
  }));
  // 카테고리 선택 시 안내문 표시
  const showCatDesc=()=>{
    const k=document.getElementById('w-cat')?.value;
    const desc=CATS[k]?.desc||'';
    const el=document.getElementById('w-cat-desc');
    const txt=document.getElementById('w-cat-desc-txt');
    if(el&&txt){txt.textContent=desc;el.style.display=desc?'block':'none';}
  };
  document.getElementById('w-cat')?.addEventListener('change',showCatDesc);
  showCatDesc();
  // 카테고리 안내 토글
  document.getElementById('cat-guide-toggle')?.addEventListener('click',()=>{
    const body=document.getElementById('cat-guide-body');
    const chev=document.getElementById('cat-guide-chev');
    const open=body.style.display==='none';
    body.style.display=open?'block':'none';
    chev.className='ti '+(open?'ti-chevron-up':'ti-chevron-down');
  });
  document.getElementById('w-date').value=today();

  // ── 영수증 스캔 (무료 OCR) ──
  // 카테고리 키워드 매핑
  const CAT_KEYWORDS={
    food:['카페','커피','스타벅스','투썸','빽다방','이디야','할리스','메가커피','공차','버블티','베이커리','뚜레쥬르','파리바게뜨','제과','빵','식당','음식','한식','중식','일식','분식','치킨','피자','버거','햄버거','KFC','롯데리아','맥도날드','배달'],
    culture:['버스','지하철','택시','카카오택시','우버','숙박','호텔','펜션','모텔','고속도로','주유','기차','KTX','항공','영화','공연','스포츠','여행'],
    mart:['마트','이마트','홈플러스','롯데마트','코스트코','편의점','CU','GS25','세븐','미니스톱','올리브영','다이소'],
    health:['병원','의원','약국','한의원','치과','안과','피부과','정형외과','내과','약'],
    culture:['영화','CGV','롯데시네마','메가박스','공연','전시','박물관','문화','스포츠','헬스','피트니스','수영'],
    edu:['학원','과외','교육','학습','어학','영어','수학','학교','대학','도서','책','교재'],
    fuel:['주유소','GS칼텍스','SK에너지','현대오일','S-OIL','오일뱅크','정비','타이어','자동차'],
    local:['상품권','온누리','지역화폐','제로페이'],
    online:['쿠팡','네이버','G마켓','옥션','11번가','위메프','티몬','인터파크','배민','요기요','배달'],
    etc:[]
  };

  const classifyCategory=(text)=>{
    const lower=text.toLowerCase();
    for(const [cat,keywords] of Object.entries(CAT_KEYWORDS)){
      if(keywords.some(kw=>lower.includes(kw))) return cat;
    }
    return 'etc';
  };

  const parseReceipt=(text)=>{
    // 금액 추출: 가장 큰 숫자(합계)
    const amountMatches=[...text.matchAll(/(\d{1,3}(?:,\d{3})*|\d+)\s*원/g)];
    const amounts=amountMatches.map(m=>parseInt(m[1].replace(/,/g,''))).filter(n=>n>0);
    const amount=amounts.length?Math.max(...amounts):0;

    // 날짜 추출
    const dateMatch=text.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/)||
                    text.match(/(\d{2,4})[년]\s*(\d{1,2})[월]\s*(\d{1,2})/);
    let date=today();
    if(dateMatch){
      const y=dateMatch[1].length===2?'20'+dateMatch[1]:dateMatch[1];
      const m=String(dateMatch[2]).padStart(2,'0');
      const d=String(dateMatch[3]).padStart(2,'0');
      date=`${y}-${m}-${d}`;
    }

    // 업체명 추출: 첫 번째 줄 또는 상호명 패턴
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>1&&l.length<30);
    const memo=lines[0]||'';

    // 카테고리 분류
    const category=classifyCategory(text);

    return {amount,date,memo,category};
  };

  const doScan=async(file)=>{
    if(!file) return;
    // 미리보기
    const reader=new FileReader();
    reader.onload=e=>{
      document.getElementById('scan-img').src=e.target.result;
      document.getElementById('scan-preview').style.display='block';
    };
    reader.readAsDataURL(file);

    document.getElementById('scan-loading').style.display='block';
    document.getElementById('scan-result').style.display='none';
    const loadingTxt=document.getElementById('scan-loading').querySelector('div');
    if(loadingTxt) loadingTxt.textContent='OCR 라이브러리 로딩 중...';

    try{
      // Tesseract 동적 로드 (필요할 때만)
      if(!window.Tesseract){
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js';
          s.onload=res; s.onerror=()=>rej(new Error('OCR 라이브러리 로드 실패. 인터넷 연결을 확인하세요.'));
          document.head.appendChild(s);
        });
      }
      if(loadingTxt) loadingTxt.textContent='영수증 텍스트 인식 중... (10~20초)';
      // Tesseract OCR (한국어+영어)
      const result=await window.Tesseract.recognize(file,'kor+eng',{
        logger:m=>{
          if(m.status==='recognizing text'){
            const pct=Math.round((m.progress||0)*100);
            const el=document.getElementById('scan-loading')?.querySelector('div');
            if(el) el.textContent=`영수증 인식 중... ${pct}%`;
          }
        }
      });
      const text=result.data.text||'';
      if(!text.trim()) throw new Error('텍스트를 인식하지 못했습니다. 더 선명한 사진을 이용해 주세요.');

      const parsed=parseReceipt(text);

      // 폼 자동입력
      if(parsed.category) document.getElementById('w-cat').value=parsed.category;
      if(parsed.amount>0) document.getElementById('w-amt').value=parsed.amount;
      if(parsed.date)     document.getElementById('w-date').value=parsed.date;
      if(parsed.memo)     document.getElementById('w-memo').value=parsed.memo;
      document.getElementById('w-amt')?.dispatchEvent(new Event('input'));

      const cat=CATS[parsed.category];
      document.getElementById('scan-result-body').innerHTML=
        `<div>📂 카테고리: <strong>${cat?cat.label:parsed.category}</strong></div>
         <div>💰 금액: <strong>${fmtW(parsed.amount)}</strong></div>
         <div>📅 날짜: <strong>${parsed.date}</strong></div>
         <div>🏪 업체: <strong>${parsed.memo||'-'}</strong></div>
         <div style="margin-top:6px;font-size:11px;opacity:.7">내용이 다르면 아래 폼에서 직접 수정하세요</div>`;
      document.getElementById('scan-result').style.display='block';
      showToast('인식 완료! 내용을 확인하세요');
    }catch(e){
      showToast('인식 오류: '+e.message,'err');
    }finally{
      document.getElementById('scan-loading').style.display='none';
    }
  };

  document.getElementById('scan-btn')?.addEventListener('click',()=>{
    const f=document.getElementById('receipt-file');
    f.setAttribute('capture','environment');
    f.click();
  });
  document.getElementById('gallery-btn')?.addEventListener('click',()=>{
    const f=document.getElementById('receipt-file');
    f.removeAttribute('capture');
    f.click();
  });
  document.getElementById('receipt-file')?.addEventListener('change',e=>{
    if(e.target.files[0]) doScan(e.target.files[0]);
  });

  // 금액 입력 시 잔액 실시간 표시 + 초과 경고
  document.getElementById('w-amt')?.addEventListener('input',function(){
    const amt=parseInt(this.value)||0;
    const totalRemain=parseInt(this.dataset.remain)||0;
    const afterRemain=totalRemain-amt;
    const el=document.getElementById('w-remain-val');
    const display=document.getElementById('w-remain-display');
    if(!el)return;
    el.textContent=fmtW(Math.max(0,afterRemain));
    el.style.color=afterRemain<0?'#A32D2D':'#004A2F';
    if(display){
      if(afterRemain<0){
        display.style.background='#FCEBEB';
        display.innerHTML=`<span style="font-size:11px;color:#A32D2D"><i class="ti ti-alert-triangle"></i> 잔액 ${fmtW(totalRemain)} 초과! ${fmtW(Math.abs(afterRemain))} 부족</span>`;
      }else{
        display.style.background='#f4f4f0';
        display.innerHTML=`<span style="font-size:11px;color:var(--text2)">신청 후 잔액</span><span id="w-remain-val" style="font-size:13px;font-weight:700;color:#004A2F">${fmtW(afterRemain)}</span>`;
      }
    }
  });

  document.getElementById('w-sub')?.addEventListener('click',async()=>{
    const cat=document.getElementById('w-cat').value;
    const amt=parseInt(document.getElementById('w-amt').value)||0;
    const date=document.getElementById('w-date').value;
    const memo=document.getElementById('w-memo').value.trim();
    const receipt=document.getElementById('w-receipt').value.trim();
    const totalRemain=parseInt(document.getElementById('w-amt').dataset.remain)||0;
    if(!amt||amt<=0)return showToast('금액을 입력하세요','err');
    if(!date)return showToast('날짜를 선택하세요','err');
    if(amt>totalRemain)return showToast(`잔여 복지비 ${fmtW(totalRemain)} 초과입니다`,'err');
    const btn=document.getElementById('w-sub');btn.disabled=true;
    try{
      const ym=thisYm();
      await addWReq({uid:CU.uid,memberName:CM?.name||'',category:cat,amount:amt,usedDate:date,memo,receipt,ym});
      notify('복지비 신청',`${CM?.name}님\n카테고리: ${CATS[cat]?.label}\n금액: ${fmtW(amt)}\n사용처: ${memo}`,CM?.name||'',CM?.phone||'');
      showToast('복지비 신청이 완료되었습니다');
      setTimeout(()=>go('welfare'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
    finally{btn.disabled=false;}
  });
}

window.copyUnionAcc=function(){

};
window.pickType=function(t){
  document.getElementById('btn-happy').className='sel-btn'+(t==='happy'?' on-happy':'');
  document.getElementById('btn-sad').className='sel-btn'+(t==='sad'?' on-sad':'');

};
window.pickAmt=function(el,amt){
  document.querySelectorAll('.amt-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('etc-wrap').style.display=amt===0?'block':'none';
  document.getElementById('s-amt').value=amt;
};

function bSanjo(){
  document.getElementById('s-date').value=today();
  document.getElementById('s-sub')?.addEventListener('click',async()=>{
    const type=document.getElementById('s-type').value;
    if(!type)return showToast('경사/애사를 선택하세요','err');
    let amt=parseInt(document.getElementById('s-amt').value)||0;
    if(amt===0)amt=parseInt(document.getElementById('s-amt-etc')?.value)||0;
    if(!amt||amt<=0)return showToast('금액을 선택하거나 입력하세요','err');
    const date=document.getElementById('s-date').value;
    const note=document.getElementById('s-note').value.trim();
    const account=document.getElementById('s-account').value.trim();
    if(!date)return showToast('날짜를 선택하세요','err');
    // 잔액 체크 (복지비+상조비 통합 한도)
    const ym=thisYm();
    const lim=await getLimit(CU.uid,ym);
    const totalCharge=lim?.totalCharge||lim?.chargeAmount||0;
    const ua=lim?.usedAmounts||{};
    const totalUsed=Object.values(ua).reduce((s,v)=>s+v,0);
    const sanjoUsed=lim?.sanjoUsed||0;
    const totalRemain=Math.max(0,totalCharge-totalUsed-sanjoUsed);
    if(amt>totalRemain){
      return showToast(`잔여 복지비 ${fmtW(totalRemain)} 초과입니다`,'err');
    }
    const btn=document.getElementById('s-sub');btn.disabled=true;
    try{
      await addSanjo({uid:CU.uid,memberName:CM?.name||'',eventType:type,amount:amt,eventDate:date,note,account,ym});
      notify('상조회비 신청',`${CM?.name}님\n구분: ${type==='happy'?'경사':'애사'}\n금액: ${fmtW(amt)}\n내용: ${note}\n잔여복지비: ${fmtW(totalRemain-amt)}`,CM?.name||'',CM?.phone||'');
      showToast('상조회비 신청이 완료되었습니다');
      setTimeout(()=>go('sanjo'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
    finally{btn.disabled=false;}
  });
}

function bMyInfo(){
  // 자동이체일 선택
  window.pickAutoDay=function(day){
    document.querySelectorAll('.at-day-btn').forEach(b=>{
      b.style.border='1.5px solid var(--border)';b.style.background='var(--card)';b.style.color='var(--text)';
    });

    if(sel){sel.style.border='1.5px solid #185FA5';sel.style.background='#EAF3FF';sel.style.color='#185FA5';}
    document.getElementById('at-day').value=day;
  };
  // 초기 선택 표시
  (()=>{
    const savedDay=document.getElementById('at-day')?.value;
    if(savedDay) window.pickAutoDay(savedDay);
    const curEl=document.getElementById('at-current');
    if(curEl){
      if(CM?.withholding){
        curEl.innerHTML='<i class="ti ti-check" style="color:#27500A"></i> 현재 설정: <strong style="color:#27500A">급여 원천징수</strong>';

      }else{
        curEl.innerHTML='<i class="ti ti-alert-circle" style="color:#854F0B"></i> 아직 납부 방식이 설정되지 않았습니다';

    }
  })();
  // 원천징수 체크 시 자동이체일 비활성화
  document.getElementById('at-withholding')?.addEventListener('change',function(){
    document.querySelectorAll('.at-day-btn').forEach(b=>{

    finally{btn.disabled=false;}

  if(document.getElementById('at-withholding')?.checked){
    document.querySelectorAll('.at-day-btn').forEach(b=>{b.style.opacity='.4';b.style.pointerEvents='none';});

  // 비밀번호 변경 토글

  document.getElementById('acc-save')?.addEventListener('click',async()=>{
    const bank=document.getElementById('acc-bank').value.trim();
    const welfare=document.getElementById('acc-welfare').value.trim();
    await saveMember(CU.uid,{bankAccount:bank,welfareAccount:welfare});
    CM={...CM,bankAccount:bank,welfareAccount:welfare};
    showToast('계좌 정보가 저장됐습니다');
    document.getElementById('acc-modal').classList.add('hd');

  });
  // 조합비 변경 신청 내역 로드 + 이번 달 신청 횟수 체크 (월 2회 제한)
  let drMonthCount=0;
  getMyDuesReqs(CU.uid).then(reqs=>{
    const wrap=document.getElementById('dr-list-wrap');
    if(!wrap)return;
    if(!reqs.length){wrap.innerHTML='<div class="em" style="padding:12px"><i class="ti ti-clock"></i><p style="font-size:12px">변경 신청 내역이 없습니다</p></div>';return;}
    wrap.innerHTML=reqs.map(r=>`<div class="lr">
      <div class="ic ica"><i class="ti ti-coins"></i></div>
      <div class="inf">
        <div class="nm">${r.applyMonth||''} · ${fmtW(r.newDues)}으로 변경</div>
        <div class="sb">${r.reason||''}</div>
        <span class="bdg ${stC(r.status)}" style="margin-top:3px">${stL(r.status)}</span>
      </div>
    </div>`).join('');
    const thisYm=new Date().toISOString().slice(0,7);
    drMonthCount=reqs.filter(r=>{
      const created=r.createdAt?.toDate?r.createdAt.toDate():null;

    }).length;
    if(drMonthCount>=2){

  document.getElementById('dr-sub')?.addEventListener('click',async()=>{
    if(drMonthCount>=2) return showToast('이번 달 변경 신청 횟수를 모두 사용했습니다 (월 2회 제한)','err');

      notify('조합비 변경 신청',`${CM?.name}님\n현재: ${fmtW(CM?.dues||0)} → 변경: ${fmtW(newDues)}\n적용월: ${applyMonth}\n사유: ${reason}`,CM?.name||'',CM?.phone||'');
      showToast('조합비 변경 신청이 완료되었습니다');
      document.getElementById('dr-dues').value='';
      document.getElementById('dr-reason').value='';
      setTimeout(()=>go('myinfo'),800);
    }catch(e){showToast('오류: '+e.message,'err');}
    finally{btn.disabled=false;}
  });
    // 발급방식 선택
  window.donPickType=function(type,el){
    ['don-type-print','don-type-hometax'].forEach(id=>{
      const b=document.getElementById(id);
      if(b){b.style.border='1.5px solid var(--border)';b.style.background='var(--card)';}
    });
    el.style.border='1.5px solid #534AB7';el.style.background='#EDE9FE';
    document.getElementById('don-type').value=type;
  };
  document.getElementById('don-rr1')?.addEventListener('input',function(){
    if(this.value.length===6) document.getElementById('don-rr2')?.focus();
  });
  // 납부 조합비 자동 계산 + 중복 체크
  const calcDonAmt=async(year)=>{
    const calcInfo=document.getElementById('don-calc-info');
    const amtInput=document.getElementById('don-amt');
    const duesHistory=CM?.duesHistory||{};
    let totalPaid=0,months=0;
    for(const [ym,v] of Object.entries(duesHistory)){
      if(ym.startsWith(year)){totalPaid+=(v.dues||0);months++;}
    }
    if(totalPaid>0){
      amtInput.value=totalPaid;
      if(calcInfo) calcInfo.innerHTML=`${year}년 <strong>${months}개월</strong> 납부: <strong style="color:#004A2F">${fmtW(totalPaid)}</strong> (수정 가능)`;
    } else {
      amtInput.value='';
      if(calcInfo) calcInfo.textContent=`${year}년 납부 내역 없음 — 직접 입력해 주세요.`;
    }
    updateTaxPreview();
    try{
      const myDons=await getMyDonations(CU.uid);
      const dup=myDons.find(d=>d.year===year&&d.status!=='rejected');
      const warnEl=document.getElementById('don-dup-warn');
      const msgEl=document.getElementById('don-dup-msg');
      const subBtn=document.getElementById('don-sub');
      if(dup){
        if(warnEl) warnEl.style.display='flex';
        if(msgEl) msgEl.textContent=`${year}년도 기부금영수증은 이미 ${stL(dup.status)} 상태입니다. 연도당 1회만 신청 가능합니다.`;
        if(subBtn) subBtn.disabled=true;
      } else {
        if(warnEl) warnEl.style.display='none';
        if(subBtn) subBtn.disabled=false;
      }
    }catch(e){}
  };
  // 세액공제 미리보기 갱신
  const updateTaxPreview=()=>{
    const amt=parseInt(document.getElementById('don-amt')?.value)||0;
    const preview=document.getElementById('don-tax-preview');
    const amountEl=document.getElementById('don-tax-amount');
    if(amt>0){
      const credit=calcTaxCredit(amt);
      if(amountEl) amountEl.textContent=fmtW(credit);
      if(preview) preview.style.display='block';
    }else{
      if(preview) preview.style.display='none';
    }
  };
  document.getElementById('don-amt')?.addEventListener('input',updateTaxPreview);
  document.getElementById('don-year')?.addEventListener('change',e=>calcDonAmt(e.target.value));
  calcDonAmt(document.getElementById('don-year')?.value||new Date().getFullYear().toString());
  // 기부금 내역 렌더링 (출력/다운로드 버튼 포함)
  const renderDonList=async()=>{
    const reqs=await getMyDonations(CU.uid);

    if(!wrap)return;

      <div class="inf" style="flex:1">
        <div class="nm">${r.year}년도 기부금영수증</div>
        <div class="sb">${fmtW(r.amount||0)} · ${r.donType==='hometax'?'국세청 파일':'서식 출력'}</div>
        <span class="bdg ${stC(r.status)}">${stL(r.status)}</span>
      </div>
      ${r.status==='approved'?`<div style="display:flex;gap:6px;width:100%;margin-top:8px;padding-left:44px">
        ${r.donType!=='hometax'?`<button class="btn-sm don-print-btn" data-id="${r.id}" style="background:#534AB7;color:#fff;border-color:#534AB7;font-size:11px;flex:1"><i class="ti ti-printer"></i> 영수증 출력</button>`:''}
        ${r.donType==='hometax'?`<div style="font-size:10.5px;color:#185FA5;background:#EAF3FF;border:.5px solid #b0cef0;border-radius:6px;padding:6px 8px;flex:1"><i class="ti ti-circle-check"></i> 조합에서 국세청에 일괄 신고 처리합니다</div>`:''}
      </div>`:''}
      ${r.status==='pending'?'<div style="font-size:10px;color:var(--text2);margin-top:4px;padding-left:44px">⏳ 관리자 승인 후 출력/다운로드 가능합니다</div>':''}
      ${r.status==='rejected'?'<div style="font-size:10px;color:#A32D2D;margin-top:4px;padding-left:44px">❌ 반려됨 - 관리자에게 문의하세요</div>':''}
    </div>`).join('');
    document.querySelectorAll('.don-print-btn').forEach(btn=>btn.addEventListener('click',async()=>{
      const all=await getMyDonations(CU.uid);
      const r=all.find(x=>x.id===btn.dataset.id);
      if(r) printDonationReceipt(r);
    }));
  };
  renderDonList();
  // 기부금영수증 신청
  document.getElementById('don-sub')?.addEventListener('click',async()=>{
    const year=document.getElementById('don-year').value;
    const amt=parseInt(document.getElementById('don-amt').value)||0;
    const donName=document.getElementById('don-name').value.trim();
    const rr1=document.getElementById('don-rr1').value.trim();
    const rr2=document.getElementById('don-rr2').value.trim();
    const addr=document.getElementById('don-addr').value.trim();
    const addr2=document.getElementById('don-addr2').value.trim();
    const donType=document.getElementById('don-type').value;
    if(!donName) return showToast('성명을 입력하세요','err');
    if(rr1.length!==6||rr2.length!==7) return showToast('주민등록번호를 정확히 입력하세요','err');
    if(!/^\d+$/.test(rr1+rr2)) return showToast('주민등록번호는 숫자만 입력하세요','err');
    if(!addr) return showToast('주소를 입력하세요','err');
    if(amt<=0) return showToast('납부 조합비를 입력하세요','err');
    if(!donType) return showToast('발급 방식을 선택하세요','err');
    const rrMasked=`${rr1}-${rr2[0]}******`;
    const fullAddress=addr+(addr2?' '+addr2:'');
    const btn=document.getElementById('don-sub');btn.disabled=true;
    btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 신청 중...';
    try{
      await addDonation({uid:CU.uid,memberName:donName,phone:CM?.phone||'',year,amount:amt,address:fullAddress,donType,residentNum:rrMasked,residentFull:rr1+rr2,orgName:'충남복지통공무원노동조합'});
      notify('기부금영수증 신청',`${donName}님\n연도: ${year}년\n금액: ${fmtW(amt)}\n방식: ${donType==='hometax'?'국세청파일':'서식출력'}`,donName,CM?.phone||'');
      showToast('신청 완료! 관리자 승인 후 출력/다운로드하세요');
      document.getElementById('don-rr1').value='';document.getElementById('don-rr2').value='';
      document.getElementById('don-addr').value='';document.getElementById('don-addr2').value='';
      document.getElementById('don-type').value='';
      ['don-type-print','don-type-hometax'].forEach(id=>{const b=document.getElementById(id);if(b){b.style.border='1.5px solid var(--border)';b.style.background='var(--card)';}});
      await renderDonList();
    }catch(e){showToast('오류: '+e.message,'err');}
    finally{btn.disabled=false;btn.innerHTML='<i class="ti ti-file-invoice"></i> 영수증 신청하기';}
  });
}

// ══ 관리자 대시보드 ══
async function pgADash(){
  const ym=thisYm();
  const [members,limits,sanjos,wReqs,donations,inquiries,lifeEvents,duesReqs]=await Promise.all([
    getMembers(),getAllLimits(ym),getAllSanjo(),getAllWReqs(ym),
    getAllDonations().catch(()=>[]),
    getAllInquiries().catch(()=>[]),
    getLifeEvents().catch(()=>[]),
    getAllDuesReqs().catch(()=>[])
  ]);
  const active=members.filter(m=>m.status==='active');
  const pending=members.filter(m=>m.status==='pending');
  const withdraw=members.filter(m=>m.status==='withdraw');
  const lmap=Object.fromEntries(limits.map(l=>[l.uid,l]));

async function pgADuesStatus(){
  const ym=thisYm();
  const [members,limits]=await Promise.all([getMembers(),getAllLimits(ym)]);

  const paid=active.filter(m=>lmap[m.id]?.paid);
  const unpaid=active.filter(m=>!lmap[m.id]?.paid);
  const totalDues=active.reduce((s,m)=>s+(m.dues||0),0);
  const paidDues=paid.reduce((s,m)=>s+(m.dues||0),0);
  const totalCharge=paid.reduce((s,m)=>s+calcCharge(m.dues||0,m.chargeRate??90),0);

  const mkRow=(m,isPaid)=>{
    const lim=lmap[m.id]||{};
    const charge=calcCharge(m.dues||0,m.chargeRate??90);
    return `<div class="lr">
      <div class="ic ${isPaid?'icg':'icr'}" style="font-size:13px;font-weight:700;flex-shrink:0">${(m.name||'?')[0]}</div>

        <div class="sb">조합비 ${fmtW(m.dues||0)} · 복지충전 ${fmtW(charge)}</div>
        ${m.bankAccount?`<div class="sb">납부계좌: ${m.bankAccount}</div>`:''}

        <span class="bdg ${isPaid?'bg':'br'}">${isPaid?'납부완료':'미납'}</span>
        ${lim.charged?`<div style="font-size:10px;color:#27500A;margin-top:3px">충전완료</div>`:`<div style="font-size:10px;color:#854F0B;margin-top:3px">미충전</div>`}
      </div>
    </div>`;
  };

  return `<div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="go('admin-dash')" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px">← 뒤로</button>

    </div>
  </div>

    <div class="sg" style="margin-bottom:10px">

      <div class="sb2"><div class="vl" style="color:#A32D2D">${unpaid.length}명</div><div class="lb">미납</div></div>
      <div class="sb2"><div class="vl" style="font-size:14px">${fmtW(paidDues)}</div><div class="lb">수납 조합비</div></div>
      <div class="sb2"><div class="vl" style="font-size:14px;color:var(--green)">${fmtW(totalCharge)}</div><div class="lb">총 충전액</div></div>

function bACharge(){
  const ym=thisYm();
  const doCharge=async uid=>{
    const m=allM.find(x=>x.id===uid);if(!m)return;
    const lim=await getLimit(uid,ym);
    const mDues=m.dues??0; // 항상 dues 필드 기준
    const mRate=m.chargeRate??90;
    const charge=calcCharge(mDues,mRate);
    // duesHistory도 동기화
    const dH={...m.duesHistory||{},[ym]:{dues:mDues,charge}};
    await saveMember(uid,{duesHistory:dH});
    const catAmounts={};
    CK.forEach(k=>{catAmounts[k]=m.catAmounts?.[k]||Math.round(charge/CK.length);});
    await saveLimit(uid,ym,{dues:mDues,chargeRate:mRate,chargeAmount:charge,totalCharge:charge,catAmounts,usedAmounts:lim?.usedAmounts||{},sanjoUsed:lim?.sanjoUsed||0,paid:true,charged:true});
  };
  document.querySelectorAll('.tog-paid').forEach(btn=>btn.addEventListener('click',async()=>{
    const paid=btn.dataset.paid==='true';
    await saveLimit(btn.dataset.uid,ym,{paid:!paid});
    showToast(!paid?'납부 완료':'미납으로 변경');
    setTimeout(()=>go('admin-charge'),600);
  }));
  document.querySelectorAll('.do-charge').forEach(btn=>btn.addEventListener('click',async()=>{
    if(btn.disabled)return;
    btn.disabled=true;btn.textContent='충전중...';
    try{await doCharge(btn.dataset.uid);showToast('충전 완료');setTimeout(()=>go('admin-charge'),600);}
    catch(e){showToast('오류: '+e.message,'err');btn.disabled=false;}
  }));
  document.getElementById('bulk-btn')?.addEventListener('click',async()=>{
    const btn=document.getElementById('bulk-btn');
    btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 처리 중...';
    try{
      const [members,limits]=await Promise.all([getMembers(),getAllLimits(ym)]);
      allM=members;
      const lmap=Object.fromEntries(limits.map(l=>[l.uid,l]));
      const to=members.filter(m=>m.status==='active'&&lmap[m.id]?.paid&&!lmap[m.id]?.charged);
      await Promise.all(to.map(m=>doCharge(m.id)));
      showToast(`${to.length}명 충전 완료`);
      setTimeout(()=>go('admin-charge'),800);
    }catch(e){showToast('오류: '+e.message,'err');btn.disabled=false;}
  });
  document.querySelectorAll('.chg-dues').forEach(btn=>btn.addEventListener('click',()=>{
    const uid=btn.dataset.uid;
    const m=allM.find(x=>x.id===uid);
    document.getElementById('dc-uid').value=uid;
    document.getElementById('dc-amt').value=m?.duesHistory?.[ym]?.dues??m?.dues??0;
    document.getElementById('dc-rate').value=m?.chargeRate??90;
    document.getElementById('dues-modal').classList.remove('hd');
  }));
  document.getElementById('dc-close')?.addEventListener('click',()=>document.getElementById('dues-modal').classList.add('hd'));
  document.getElementById('dc-save')?.addEventListener('click',async()=>{
    const uid=document.getElementById('dc-uid').value;
    const dues=parseInt(document.getElementById('dc-amt').value)||0;
    const rate=parseInt(document.getElementById('dc-rate').value)||90;
    const m=allM.find(x=>x.id===uid);
    const dH={...m?.duesHistory||{},[ym]:{dues,charge:calcCharge(dues,rate)}};
    await saveMember(uid,{duesHistory:dH});
    showToast('이달 회비가 변경됐습니다');
    document.getElementById('dues-modal').classList.add('hd');
    setTimeout(()=>go('admin-charge'),800);
  });
}

    showToast('반려됐습니다');

  }));
  document.querySelectorAll('.approve-s').forEach(btn=>btn.addEventListener('click',async()=>{

  }));

    showToast('반려됐습니다');
    setTimeout(()=>go('admin-approve'),800);
  }));
}

async function pgACatReq(){
  const ym=thisYm();
  const [wReqs,members]=await Promise.all([getAllWReqs(ym),getMembers()]);
  const mmap=Object.fromEntries(members.map(m=>[m.id,m]));

  // 카테고리별로 그룹핑
  const grouped={};
  CK.forEach(k=>{grouped[k]={cat:CATS[k],pending:[],approved:[],rejected:[]};});
  wReqs.forEach(r=>{
    if(grouped[r.category]){
      const st=r.status==='pending'?'pending':r.status==='approved'?'approved':'rejected';
      grouped[r.category][st].push(r);
    }
  });

  const catSections=CK.map(k=>{
    const g=grouped[k];
    const allReqs=[...g.pending,...g.approved,...g.rejected];
    if(!allReqs.length) return '';

    const rows=allReqs.map(r=>{
      const m=mmap[r.uid]||{};
      const stCls2=r.status==='pending'?'ba':r.status==='approved'?'bg':'br';
      const stTxt=r.status==='pending'?'대기중':r.status==='approved'?'승인':'반려';
      return `<div class="lr" style="flex-wrap:wrap;gap:6px">
        <div class="inf">
          <div class="nm">${m.name||r.memberName||r.uid} · ${fmtW(r.amount)}</div>
          <div class="sb">${r.usedDate||''} · ${r.memo||''}</div>
          ${r.receipt?`<div class="sb">영수증: ${r.receipt}</div>`:''}
          <span class="bdg ${stCls2}" style="margin-top:3px">${stTxt}</span>
        </div>
        ${r.status==='pending'?`<div style="display:flex;gap:4px;flex-shrink:0">
          <button style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:var(--green);color:#fff;border:none" class="catq-approve" data-id="${r.id}" data-uid="${r.uid}" data-cat="${r.category}" data-amount="${r.amount}">승인</button>
          <button style="padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:#FCEBEB;color:#791F1F;border:none" class="catq-reject" data-id="${r.id}">반려</button>
        </div>`:''}
      </div>`;
    }).join('');

    const pendingCnt=g.pending.length;
    return `<div class="sl" style="display:flex;align-items:center;gap:6px">
      <i class="ti ${g.cat.icon}" style="color:${g.cat.color};font-size:14px"></i>
      ${g.cat.label}
      ${pendingCnt?`<span class="bdg ba">${pendingCnt}건 대기</span>`:'<span class="bdg bg">모두 처리됨</span>'}
    </div>
    <div class="card">${rows}</div>`;
  }).join('');

  const totalPending=wReqs.filter(r=>r.status==='pending').length;

  return `<div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="go('admin-dash')" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px;flex-shrink:0">← 뒤로</button>
      <div><h2>카테고리별 신청 현황</h2><p>${ymLabel(ym)} · 대기 ${totalPending}건</p></div>
    </div>
  </div>
  <div class="pg">
    ${!catSections.trim()?'<div class="em"><i class="ti ti-receipt-off"></i><p>이달 신청 내역이 없습니다</p></div>':catSections}
    <div style="text-align:center;padding:16px 0 8px">
      <button onclick="go('admin-dash')" style="background:var(--green);border:none;color:#fff;border-radius:20px;padding:9px 28px;cursor:pointer;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(0,74,47,.25)"><i class="ti ti-layout-dashboard"></i> 대시보드로 돌아가기</button>
    </div>
  </div>`;
}

function csvDownload(filename, headers, rows){
  const bom='\uFEFF';
  const escape=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[headers.map(escape).join(','), ...rows.map(r=>r.map(escape).join(','))];
  const csv=bom+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

    const headers=['기부자성명','주민등록번호','기부연도','기부금액','기부단체명','사업자등록번호','기부유형','비고'];
    const rows=list.map(d=>[
      d.memberName||'',
      (d.residentFull||d.residentNum||'').replace(/-/g,''),
      d.year||'',
      d.amount||0,
      '충남복지통공무원노동조합',
      '0008200000',
      '노동조합비',
      '지정기부금'
    ]);
    csvDownload(`기부금영수증_국세청업로드_전체.csv`, headers, rows);
    showToast(`홈택스 업로드 파일 전체를 다운로드했습니다 (승인 ${list.length}건)`);
  });

  // 테스트 데이터 초기화
  document.getElementById('reset-selected-btn')?.addEventListener('click',async()=>{
    const checked=[...document.querySelectorAll('.reset-chk:checked')].map(c=>c.value);
    const resetDuesHistory=document.getElementById('reset-dueshistory-chk')?.checked;
    if(!checked.length && !resetDuesHistory) return showToast('삭제할 항목을 선택하세요','err');
    const labels={welfare_requests:'복지비 신청',sanjo:'상조회비 신청',donations:'기부금영수증 신청',dues_requests:'조합비 변경 신청',limits:'복지비 잔액·충전 기록',notices:'공지사항',admin_logs:'관리자 활동 로그'};
    let names=checked.map(k=>labels[k]).join(', ');
    if(resetDuesHistory) names+=(names?', ':'')+'조합비 납부이력';
    if(!confirm(`다음 항목을 전체 삭제합니다:\n${names}\n\n이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?`)) return;
    if(!confirm('정말로 진행하시겠습니까? 한 번 더 확인합니다.')) return;

    const btn=document.getElementById('reset-selected-btn');
    const progress=document.getElementById('reset-progress');
    btn.disabled=true;
    progress.style.display='block';
    let totalDeleted=0;
    try{
      for(const colName of checked){
        progress.textContent=`${labels[colName]} 삭제 중...`;
        const snap=await getDocs(collection(db,colName));
        const deletePromises=snap.docs.map(d=>deleteDoc(doc(db,colName,d.id)));
        await Promise.all(deletePromises);
        totalDeleted+=snap.docs.length;
        progress.textContent=`${labels[colName]} ${snap.docs.length}건 삭제 완료`;
      }
      if(resetDuesHistory){
        progress.textContent='조합비 납부이력 초기화 중...';
        const memSnap=await getDocs(collection(db,'members'));
        const updatePromises=memSnap.docs.map(d=>updateDoc(doc(db,'members',d.id),{duesHistory:{}}));
        await Promise.all(updatePromises);
        totalDeleted+=memSnap.docs.length;
        progress.textContent=`조합비 납부이력 ${memSnap.docs.length}명 초기화 완료`;
      }
      logAdminAction('테스트데이터초기화',`${names} (총 ${totalDeleted}건)`);
      showToast(`초기화 완료! 총 ${totalDeleted}건 처리됨`);
      progress.textContent=`✅ 완료: 총 ${totalDeleted}건 처리됨`;
      document.querySelectorAll('.reset-chk').forEach(c=>c.checked=false);
      if(document.getElementById('reset-dueshistory-chk')) document.getElementById('reset-dueshistory-chk').checked=false;
    }catch(e){
      showToast('오류: '+e.message,'err');
      progress.textContent='❌ 오류 발생: '+e.message;
    }finally{
      btn.disabled=false;
    }
  });
}

function bANotice(){
  bindSearch('anc-srch','.anc-row','');
  // 새 공지 폼 토글
  document.getElementById('nc-form-toggle')?.addEventListener('click',()=>{
    const body=document.getElementById('nc-form-body');
    const chev=document.getElementById('nc-form-chev');
    const open=body.style.display==='none';
    body.style.display=open?'block':'none';
    chev.className='ti '+(open?'ti-chevron-up':'ti-chevron-down');
  });
  // 내용 펼치기 토글 전역 함수
  window.toggleNoticeBody=function(id, titleEl){
    const body=document.getElementById(id);
    if(!body) return;
    const open=body.style.display==='none';
    body.style.display=open?'block':'none';
    const hint=titleEl?.querySelector('div:last-child');
    if(hint) hint.innerHTML=open?
      `${hint.innerHTML.replace('▼','▲').replace('클릭하면 내용 보기','접기')}`
      :`${hint.innerHTML.replace('▲','▼').replace('접기','클릭하면 내용 보기')}`;
  };
  // 체크박스 변경 시 선택 삭제 버튼 표시
  const delCheckedBtn=document.getElementById('nc-del-checked');
  const updateDelBtn=()=>{
    const checked=document.querySelectorAll('.nc-chk:checked');
    if(delCheckedBtn) delCheckedBtn.style.display=checked.length>0?'inline-flex':'none';
  };
  document.querySelectorAll('.nc-chk').forEach(chk=>chk.addEventListener('change',updateDelBtn));
  // 선택 삭제
  delCheckedBtn?.addEventListener('click',async()=>{
    const checked=[...document.querySelectorAll('.nc-chk:checked')];
    if(!checked.length) return;
    if(!confirm(`선택한 ${checked.length}건의 공지를 삭제하시겠습니까?`)) return;
    try{
      await Promise.all(checked.map(chk=>deleteDoc(doc(db,'notices',chk.dataset.nid))));
      logAdminAction('공지삭제',`${checked.length}건 삭제`);
      showToast(`${checked.length}건 삭제됐습니다`);
      setTimeout(()=>go('admin-notice'),600);
    }catch(e){showToast('오류: '+e.message,'err');}
  });
  // 공지 등록
  document.getElementById('nc-submit')?.addEventListener('click',async()=>{
    const title=document.getElementById('nc-title').value.trim();
    const body=document.getElementById('nc-body').value.trim();
    const pinned=document.getElementById('nc-pinned').checked;
    if(!title) return showToast('제목을 입력하세요','err');
    if(!body)  return showToast('내용을 입력하세요','err');
    const btn=document.getElementById('nc-submit');
    btn.disabled=true;
    btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 등록 중...';
    try{
      await addDoc(collection(db,'notices'),{
        title, body, pinned,
        authorName: CM?.name||'관리자',
        authorUid: CU.uid,
        createdAt: serverTimestamp()
      });
      showToast('공지가 등록됐습니다');
      setTimeout(()=>go('admin-notice'),600);
    }catch(e){
      showToast('오류: '+e.message,'err');
      btn.disabled=false;
      btn.innerHTML='<i class="ti ti-send"></i> 공지 등록';
    }
  });
  // 공지 수정 버튼
  document.querySelectorAll('.nc-edit-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const nid=btn.dataset.nid;
    const bodyDiv=document.getElementById('nb-admin-'+nid);
    const editDiv=document.getElementById('nb-edit-'+nid);
    if(bodyDiv) bodyDiv.style.display='none';
    if(editDiv) editDiv.style.display='block';
    btn.style.display='none';
  }));
  // 수정 취소
  document.querySelectorAll('.nc-edit-cancel-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const nid=btn.dataset.nid;
    const bodyDiv=document.getElementById('nb-admin-'+nid);
    const editDiv=document.getElementById('nb-edit-'+nid);
    const editBtn=document.querySelector('.nc-edit-btn[data-nid="'+nid+'"]');
    if(bodyDiv) bodyDiv.style.display='block';
    if(editDiv) editDiv.style.display='none';
    if(editBtn) editBtn.style.display='';
  }));
  // 수정 저장
  document.querySelectorAll('.nc-save-btn').forEach(btn=>btn.addEventListener('click',async()=>{
    const nid=btn.dataset.nid;
    const title=document.getElementById('ne-title-'+nid)?.value.trim();
    const body=document.getElementById('ne-body-'+nid)?.value.trim();
    if(!title) return showToast('제목을 입력하세요','err');
    btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin"></i>';
    try{
      await updateDoc(doc(db,'notices',nid),{title,body,updatedAt:serverTimestamp()});
      showToast('공지가 수정되었습니다');
      setTimeout(()=>go('admin-notice'),600);
    }catch(e){showToast('오류: '+e.message,'err');btn.disabled=false;btn.innerHTML='<i class="ti ti-device-floppy"></i> 저장';}
  }));
  // 공지 삭제
  document.querySelectorAll('.nc-del-btn').forEach(btn=>btn.addEventListener('click',async()=>{
    if(!confirm('이 공지를 삭제하시겠습니까?')) return;
    try{
      await deleteDoc(doc(db,'notices',btn.dataset.nid));
      showToast('삭제됐습니다');
      setTimeout(()=>go('admin-notice'),600);
    }catch(e){showToast('오류: '+e.message,'err');}
  }));
}

function bPartners(){
  bindSearch('pt-srch','.pt-row','');
  // 폼 토글
  document.getElementById('pt-form-toggle')?.addEventListener('click',()=>{
    const form=document.getElementById('pt-member-form');
    const chev=document.getElementById('pt-chevron');
    const open=form.style.display==='none';
    form.style.display=open?'block':'none';
    chev.className='ti '+(open?'ti-chevron-up':'ti-chevron-down');
  });
  // 조합원 등록 신청
  document.getElementById('ptm-submit')?.addEventListener('click',async()=>{
    const name=document.getElementById('ptm-name').value.trim();
    const category=document.getElementById('ptm-cat').value;
    const discount=document.getElementById('ptm-discount').value.trim();
    const phone=document.getElementById('ptm-phone').value.trim();
    const address=document.getElementById('ptm-address').value.trim();
    const mapUrl=document.getElementById('ptm-mapurl').value.trim();
    const memo=document.getElementById('ptm-memo').value.trim();
    if(!name) return showToast('업체명을 입력하세요','err');
    if(!category) return showToast('업종을 선택하세요','err');
    if(!discount) return showToast('할인 내용을 입력하세요','err');
    const btn=document.getElementById('ptm-submit');
    btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 신청 중...';
    try{
      await addPartner({name,category,discount,phone,address,mapUrl,memo,
        submittedBy:CM?.name||'',submittedUid:CU.uid,pendingReview:true});
      notify('제휴업체 등록 신청',`${CM?.name}님이 업체를 제보했습니다.\n업체명: ${name}\n할인: ${discount}`,CM?.name||'',CM?.phone||'');
      showToast('등록 신청이 완료됐습니다. 관리자 검토 후 게시됩니다.');
      document.getElementById('pt-member-form').style.display='none';
      document.getElementById('ptm-name').value='';
      document.getElementById('ptm-discount').value='';
      document.getElementById('ptm-phone').value='';
      document.getElementById('ptm-address').value='';
      document.getElementById('ptm-mapurl').value='';
      document.getElementById('ptm-memo').value='';
      document.getElementById('ptm-cat').value='';
      btn.disabled=false;btn.innerHTML='<i class="ti ti-send"></i> 등록 신청';
    }catch(e){
      showToast('오류: '+e.message,'err');
      btn.disabled=false;btn.innerHTML='<i class="ti ti-send"></i> 등록 신청';
    }
  });
  // 카드 탭 — 메모 펼치기
  document.querySelectorAll('.partner-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const memo=document.getElementById('pm-'+card.dataset.pid);
      if(memo) memo.style.display=memo.style.display==='none'?'block':'none';
    });
  });
}

// ══ 관리자 활동 로그 ══
async function pgALogs(){
  let logs=[];
  try{
    const s=await getDocs(query(collection(db,'admin_logs'),orderBy('createdAt','desc'),limit(100)));
    logs=s.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){logs=[];}

  const actionIcon={
    '가입승인':'ti-user-check','복지비승인':'ti-credit-card','상조회비승인':'ti-heart',
    '기부금영수증승인':'ti-file-invoice','공지삭제':'ti-trash','공지수정':'ti-edit'
  };
  const actionColor={
    '가입승인':'#004A2F','복지비승인':'#185FA5','상조회비승인':'#A32D2D',
    '기부금영수증승인':'#534AB7','공지삭제':'#791F1F','공지수정':'#854F0B'
  };

  const rows=logs.length?logs.map(l=>{
    const icon=actionIcon[l.action]||'ti-activity';
    const color=actionColor[l.action]||'#666';
    const dt=l.createdAt?.toDate?fmtDt(l.createdAt.toDate()):'';
    return `<div class="lr" style="border-bottom:.5px solid var(--border)">
      <div class="ic" style="background:${color}22;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="ti ${icon}" style="color:${color};font-size:16px"></i>
      </div>
      <div class="inf">
        <div class="nm" style="font-size:13px">${l.action} <span style="font-weight:400;color:var(--text2);font-size:11px">by ${l.adminName||'관리자'}</span></div>
        <div class="sb" style="font-size:11px">${l.detail||''}</div>
        <div class="sb" style="font-size:10px;color:var(--text2)">${dt}</div>
      </div>
    </div>`;
  }).join(''):'<div class="em"><i class="ti ti-history"></i><p>활동 기록이 없습니다</p></div>';

  return `<div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="go('admin-settings')" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px">← 뒤로</button>
      <div><h2>관리자 활동 로그</h2><p>최근 100건</p></div>
    </div>
  </div>
  <div class="pg">
    <div class="card">${rows}</div>
    <div style="text-align:center;padding:16px 0 8px">
      <button onclick="go('admin-dash')" style="background:var(--green);border:none;color:#fff;border-radius:20px;padding:9px 28px;cursor:pointer;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(0,74,47,.25)"><i class="ti ti-layout-dashboard"></i> 대시보드로 돌아가기</button>
    </div>
  </div>`;
}

function renderSignup(){
  appEl.innerHTML=`
  <div class="lw">
    <i class="ti ti-building-community" style="font-size:48px;color:#fff;margin-bottom:8px"></i>
    <div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">충남 복지통</div>
    <div style="font-size:13px;color:rgba(255,255,255,.65);margin-bottom:24px">충남 복지통 · 조합원 가입</div>
    <div class="lc">
      <div style="font-size:15px;font-weight:700;margin-bottom:16px;text-align:center">조합원 가입 신청</div>
      <div class="ig"><label>이름</label><input type="text" id="s-name" placeholder="홍길동"/></div>
      <div class="ig">
        <label>전화번호 (로그인 아이디로 사용)</label>
        <input type="tel" id="s-phone" placeholder="010-0000-0000" maxlength="13"/>
      </div>
      <div class="ig"><label>비밀번호 (6자 이상)</label><input type="password" id="s-pw" placeholder="비밀번호 설정"/></div>
      <div class="ig"><label>비밀번호 확인</label><input type="password" id="s-pw2" placeholder="비밀번호 재입력"/></div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px">직종 선택</label>
        <div class="job-grid">
          <div class="job-btn" id="s-jb-prev" onclick="sPickJob('전직')">전직 (사무총국)</div>
          <div class="job-btn" id="s-jb-curr" onclick="sPickJob('현직')">현직 (부서명 입력)</div>
        </div>
        <input type="hidden" id="s-jobtype"/>
        <div class="ig" id="s-dept-wrap" style="display:none;margin-bottom:0">
          <input type="text" id="s-dept" placeholder="부서명 입력 (예: 기획조정실)"/>
        </div>
      </div>
      <div class="ig"><label>조합비 납부 계좌 (선택)</label><input type="text" id="s-bank" placeholder="농협 351-0000-0000-03 홍길동"/></div>
      <div class="ig"><label>복지비 수령 계좌 (선택)</label><input type="text" id="s-welfare" placeholder="농협 351-0000-0000-03 홍길동"/></div>
      <div style="border-top:.5px solid #e0e0e0;margin:12px 0;padding-top:12px">
        <div style="font-size:12px;font-weight:600;color:#6b6b6b;margin-bottom:8px">월 조합비 (관리자 승인 후 확정)</div>
        <div class="ig" style="margin-bottom:6px">
          <label>월 납부 조합비 (원)</label>
          <input type="number" id="s-dues" placeholder="예: 30000" step="1000"/>
        </div>
        <div style="background:#EAF3DE;border-radius:8px;padding:8px 10px;font-size:11px;color:#27500A">
          <i class="ti ti-info-circle"></i> 복지 충전액 = (조합비 - 1만원) × 90%로 자동 계산됩니다 (천원단위 반올림)
        </div>
      </div>
      <button class="btn btn-p" id="signup-btn" style="margin-bottom:10px"><i class="ti ti-user-plus"></i> 가입 신청하기</button>
      <button class="btn btn-s" id="to-login-btn">이미 계정이 있으신가요? 로그인</button>
    </div>
  </div>`;
  window.sPickJob=function(t){
    document.getElementById('s-jb-prev').className='job-btn'+(t==='전직'?' on':'');
    document.getElementById('s-jb-curr').className='job-btn'+(t==='현직'?' on':'');
    document.getElementById('s-jobtype').value=t;
    document.getElementById('s-dept-wrap').style.display=t==='현직'?'block':'none';
  };
  // 전화번호 자동 하이픈
  document.getElementById('s-phone')?.addEventListener('input',e=>{
    let v=e.target.value.replace(/\D/g,'');
    if(v.length>11)v=v.slice(0,11);
    if(v.length<=3) e.target.value=v;
    else if(v.length<=7) e.target.value=v.slice(0,3)+'-'+v.slice(3);
    else e.target.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  });
  document.getElementById('signup-btn')?.addEventListener('click',async()=>{
    const name=document.getElementById('s-name').value.trim();
    const phone=document.getElementById('s-phone').value.trim().replace(/-/g,'');
    const pw=document.getElementById('s-pw').value;
    const pw2=document.getElementById('s-pw2').value;
    const jobType=document.getElementById('s-jobtype').value;
    const dept=jobType==='현직'?document.getElementById('s-dept').value.trim():'사무총국';
    const bank=document.getElementById('s-bank').value.trim();
    const welfare=document.getElementById('s-welfare').value.trim();
    const dues=parseInt(document.getElementById('s-dues').value)||0;
    if(!name||!phone)return showToast('이름과 전화번호를 입력하세요','err');
    if(phone.length<10)return showToast('전화번호를 정확히 입력하세요','err');
    if(!pw||pw.length<6)return showToast('비밀번호를 6자 이상 입력하세요','err');
    if(pw!==pw2)return showToast('비밀번호가 일치하지 않습니다','err');
    if(!jobType)return showToast('직종을 선택하세요','err');
    // 전화번호를 이메일 형식으로 변환 (Firebase용)
    const fakeEmail=`${phone}@moim.app`;
    const btn=document.getElementById('signup-btn');btn.disabled=true;
    try{
      const c=await createUserWithEmailAndPassword(auth,fakeEmail,pw);
      await saveMember(c.user.uid,{name,phone,jobType,dept,bankAccount:bank,welfareAccount:welfare,dues,chargeRate:90,status:'pending',role:'member',groupName:'충남도청'});
      notify('새 조합원 가입 신청',`${name}님이 가입 신청했습니다.\n전화번호: ${phone}\n직종: ${jobType==='전직'?'전직(사무총국)':'현직('+dept+')'}`,name,phone);
      showToast('가입 신청 완료! 관리자 승인을 기다려주세요.');
      await signOut(auth);

window.recalcAll=async function(){
  if(!confirm('모든 조합원의 이달 잔액을 재계산합니다. 계속하시겠습니까?')) return;
  const btn=document.getElementById('recalc-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin"></i> 재계산 중...';}
  try{
    const ym=thisYm();
    const members=await getMembers();
    let count=0;
    for(const m of members){
      if(!m.dues||m.dues<=0) continue;
      const dues=m.dues||0;
      const rate=m.chargeRate??90;
      const charge=calcCharge(dues,rate);
      const limKey=`${m.id}_${ym}`;
      const snap=await getDoc(doc(db,'limits',limKey));
      const d=snap.exists()?snap.data():null;
      if(!d){
        // 초기화 등으로 기록 자체가 사라진 경우 새로 생성
        await saveLimit(m.id,ym,{totalCharge:charge,usedAmounts:{},sanjoUsed:0,charged:true});
        count++;
      }else if(!d.totalCharge||d.totalCharge!==charge){
        await setDoc(doc(db,'limits',limKey),{totalCharge:charge,updatedAt:serverTimestamp()},{merge:true});
        count++;
      }
    }
    showToast(`재계산 완료 (${count}명 업데이트)`);
  }catch(e){showToast('오류: '+e.message,'err');}
  finally{
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> 전체 잔액 재계산';}
  }
};

  const dismissed=sessionStorage.getItem('pwaDismissed');
  if(!dismissed){
    const banner=document.getElementById('pwa-install-banner');
    if(banner) banner.style.display='flex';
  }
});
document.getElementById('pwa-install-btn')?.addEventListener('click',async()=>{
  const banner=document.getElementById('pwa-install-banner');
  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
  }
  if(banner) banner.style.display='none';
});
document.getElementById('pwa-dismiss-btn')?.addEventListener('click',()=>{
  const banner=document.getElementById('pwa-install-banner');
  if(banner) banner.style.display='none';
  try{sessionStorage.setItem('pwaDismissed','1');}catch(e){}
});

onAuthStateChanged(auth,async user=>{
  try{
    if(!user){renderLogin();return;}
    CU=user;
    CM=await getMember(user.uid);
    if(!CM){
      // Firebase 연결은 됐지만 회원 정보 없음 → 로그인 화면으로
      showToast('회원 정보를 찾을 수 없습니다','err');
      await signOut(auth);
      return;
    }
    go(['admin','sub_admin','finance'].includes(CM.role)?'admin-dash':'home');
    // 비활성 세션 자동 로그아웃 (30분 미사용)
    setupIdleLogout();
  }catch(e){
    console.error('초기화 오류:',e);
    // Firebase 연결 자체 실패 → 오류 메시지 표시
    appEl.innerHTML=`<div class="lw"><div style="background:#fff;border-radius:12px;padding:24px;max-width:320px;text-align:center">
      <i class="ti ti-wifi-off" style="font-size:40px;color:#A32D2D;display:block;margin-bottom:12px"></i>
      <div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:8px">연결 오류</div>
      <div style="font-size:13px;color:#6b6b6b;margin-bottom:16px">${e.message||'서버에 연결할 수 없습니다'}</div>
      <button onclick="location.reload()" style="background:#004A2F;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer">다시 시도</button>
    </div></div>`;
  }
});
} // end else (not signup QR)
</script>
</body>
</html>
